<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samuel OS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0B0C10;
    --surface: #14161C;
    --surface-2: #1B1E26;
    --line: #262932;
    --ink: #F2F3F5;
    --ink-soft: #B4B7C1;
    --ink-mute: #767986;
    --green: #2BC79A;
    --green-bg: #11271F;
    --orange: #E08A6A;
    --orange-bg: #2A1C16;
    --purple: #8B93FF;
    --purple-bg: #1A1B30;
    --yellow: #F5C842;
    --yellow-bg: #272210;
    --code-bg: #06070A;
    --sent: #1A2E1F;
    --sent-border: #1E4A2A;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px;
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .topbar .logo {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topbar .logo .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .topbar .date-badge {
    font-size: 12px;
    color: var(--ink-mute);
    background: var(--surface-2);
    border: 1px solid var(--line);
    padding: 5px 12px;
    border-radius: 999px;
  }

  .wrap { max-width: 860px; margin: 0 auto; padding: 32px 24px 80px; }

  /* ── Wake time card ── */
  .wake-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 32px;
  }
  .wake-card h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-mute);
    margin-bottom: 20px;
  }
  .wake-form {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .wake-form label {
    font-size: 14px;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .time-input-wrap {
    position: relative;
    flex: 0 0 auto;
  }
  .time-input-wrap input[type="time"] {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--ink);
    font-size: 22px;
    font-weight: 600;
    font-family: inherit;
    padding: 10px 16px;
    outline: none;
    cursor: pointer;
    color-scheme: dark;
    width: 160px;
    transition: border-color 0.15s;
  }
  .time-input-wrap input[type="time"]:focus {
    border-color: var(--green);
  }
  .btn-set {
    background: var(--green);
    color: #0B0C10;
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-set:hover { opacity: 0.85; }
  .btn-set:active { transform: scale(0.97); }
  .btn-set:disabled { opacity: 0.4; cursor: not-allowed; }

  .wake-meta {
    margin-top: 14px;
    font-size: 13px;
    color: var(--ink-mute);
    display: none;
  }
  .wake-meta.visible { display: block; }
  .wake-meta strong { color: var(--green); }

  /* ── Status bar ── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .status-pill .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-sent { background: var(--green); }
  .dot-next { background: var(--yellow); }
  .dot-pending { background: var(--line); }
  .status-pill.next-session { border-color: var(--yellow); color: var(--yellow); }

  /* ── Section labels ── */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-mute);
    margin-bottom: 14px;
    padding-left: 2px;
  }

  /* ── Session cards ── */
  .sessions { display: flex; flex-direction: column; gap: 10px; }

  .session-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .session-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--line);
    border-radius: 3px 0 0 3px;
  }
  .session-card.is-sent { background: var(--sent); border-color: var(--sent-border); }
  .session-card.is-sent::before { background: var(--green); }
  .session-card.is-next { border-color: var(--yellow); }
  .session-card.is-next::before { background: var(--yellow); }
  .session-card.no-schedule { opacity: 0.45; }

  .session-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .session-emoji { font-size: 20px; flex-shrink: 0; }
  .session-name {
    font-size: 15px;
    font-weight: 600;
    flex: 1;
  }
  .session-time {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
  }
  .session-card.is-next .session-time { color: var(--yellow); }
  .session-card.is-sent .session-time { color: var(--green); }

  .session-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 2px;
    padding-left: 32px;
  }
  .tag {
    font-size: 11px;
    color: var(--ink-mute);
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 2px 7px;
  }
  .session-card.is-sent .tag { border-color: var(--sent-border); background: transparent; }
  .tag.tag-fasted { color: var(--orange); background: var(--orange-bg); border-color: #3D2218; }

  .session-note {
    padding-left: 32px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--ink-mute);
    line-height: 1.5;
  }
  .session-note.hidden { display: none; }

  .sent-badge {
    display: none;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--green);
    background: var(--green-bg);
    border: 1px solid #1E4A2A;
    border-radius: 5px;
    padding: 2px 7px;
  }
  .session-card.is-sent .sent-badge { display: inline-block; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-mute);
    display: none;
  }
  .empty-state.visible { display: block; }
  .empty-state .big-emoji { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 15px; line-height: 1.6; }

  /* ── Loading ── */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--ink-mute);
    font-size: 14px;
  }

  /* ── Error toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #2A1616;
    border: 1px solid #4A2020;
    color: #F08080;
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    z-index: 100;
    transition: transform 0.3s ease;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Refresh btn ── */
  .btn-refresh {
    background: none;
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink-mute);
    font-size: 12px;
    padding: 5px 12px;
    cursor: pointer;
    font-family: inherit;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn-refresh:hover { color: var(--ink); border-color: var(--ink-soft); }

  .time-stack {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }
  .live-clock {
    font-size: 18px;
    line-height: 1;
    font-weight: 700;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }
  .time-zone {
    font-size: 11px;
    color: var(--ink-mute);
  }

  .btn-now {
    background: var(--surface-2);
    color: var(--ink-soft);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 650;
    cursor: pointer;
    font-family: inherit;
    transition: color 0.15s, border-color 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-now:hover { color: var(--ink); border-color: var(--green); }
  .btn-now:active { transform: scale(0.97); }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 32px;
    display: none;
  }
  .auth-card.visible { display: block; }
  .auth-card h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-mute);
    margin-bottom: 18px;
  }
  .pin-form {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .pin-form input {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--ink);
    font-size: 18px;
    font-weight: 600;
    font-family: inherit;
    padding: 12px 14px;
    outline: none;
    min-width: 180px;
  }
  .pin-form input:focus { border-color: var(--green); }
  .pin-error {
    margin-top: 12px;
    display: none;
    color: #F08080;
    font-size: 13px;
  }
  .pin-error.visible { display: block; }
  .app-shell.locked { display: none; }

  .session-card.is-due { border-color: var(--orange); }
  .session-card.is-due::before { background: var(--orange); }
  .session-card.is-due .session-time { color: var(--orange); }
  .session-subline {
    padding-left: 32px;
    margin-top: 6px;
    font-size: 12px;
    color: var(--ink-mute);
    font-variant-numeric: tabular-nums;
  }
  .session-card.is-next .session-subline { color: var(--yellow); }
  .session-card.is-due .session-subline { color: var(--orange); }
  .session-card.is-sent .session-subline { color: var(--green); }
  .session-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 12px;
  }
  .btn-taken {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink-soft);
    font-size: 12px;
    font-weight: 650;
    padding: 7px 10px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-taken:hover { color: var(--ink); border-color: var(--green); }
  .session-card.is-sent .btn-taken { color: var(--green); border-color: var(--sent-border); background: transparent; }

  @media (max-width: 600px) {
    .wake-form { flex-direction: column; align-items: flex-start; }
    .time-input-wrap input[type="time"] { width: 100%; }
    .btn-set { width: 100%; text-align: center; }
    .btn-now { width: 100%; }
    .pin-form input, .pin-form .btn-set { width: 100%; }
    .topbar { align-items: flex-start; gap: 16px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <span class="dot"></span>
    Samuel OS
  </div>
  <div style="display:flex;gap:14px;align-items:center;">
    <button class="btn-refresh" onclick="loadSchedule()">Refresh</button>
    <div class="time-stack">
      <div class="live-clock" id="liveClock">--:--</div>
      <div class="date-badge" id="dateBadge">--</div>
      <div class="time-zone" id="timeZoneLabel">Asia/Bangkok</div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="auth-card" id="authCard">
    <h2>Samuel OS PIN</h2>
    <div class="pin-form">
      <input id="pinInput" type="password" inputmode="numeric" autocomplete="current-password">
      <button class="btn-set" id="unlockBtn" onclick="unlockDashboard()">Unlock</button>
    </div>
    <div class="pin-error" id="pinError">PIN required.</div>
  </div>

  <div class="app-shell locked" id="appShell">
    <div class="wake-card">
      <h2>Wake-up time</h2>
      <div class="wake-form">
        <span class="time-input-wrap">
          <input type="time" id="wakeInput">
        </span>
        <button class="btn-now" onclick="setWakeToNow()">Use now</button>
        <button class="btn-set" id="setBtn" onclick="setSchedule()">Set schedule</button>
      </div>
      <div class="wake-meta" id="wakeMeta"></div>
    </div>

    <div class="status-bar" id="statusBar" style="display:none">
      <div class="status-pill"><span class="dot dot-sent"></span> Sent</div>
      <div class="status-pill next-session" id="nextPill" style="display:none">⏰ <span id="nextPillText"></span></div>
      <div class="status-pill"><span class="dot dot-pending"></span> Pending</div>
    </div>

    <div class="section-label" id="scheduleLabel" style="display:none">Today's sessions</div>

    <div class="sessions" id="sessionList">
      <div class="loading">Loading…</div>
    </div>

    <div class="empty-state" id="emptyState">
      <div class="big-emoji">🌅</div>
      <p>Set your wake-up time above<br>to generate today's supplement schedule.</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const TZ = 'Asia/Bangkok'
  const PIN_KEY = 'samuel-os-pin'
  const EMOJIS = { 1: '🌅', 2: '☕', 3: '🥗', 4: '🏋️', 5: '🥩', 6: '🥤', 7: '🌙' }

  let latestSchedule = []
  let latestSessions = []

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, (ch) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;',
    }[ch]))
  }

  function fmtTime(isoOrDate) {
    const d = typeof isoOrDate === 'string' ? new Date(isoOrDate) : isoOrDate
    return d.toLocaleTimeString('en-US', {
      hour: 'numeric',
      minute: '2-digit',
      hour12: true,
      timeZone: TZ,
    })
  }

  function fmtDate(date) {
    return date.toLocaleDateString('en-US', {
      weekday: 'long',
      month: 'long',
      day: 'numeric',
      timeZone: TZ,
    })
  }

  function timeInputValue(date) {
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: TZ,
      hour: '2-digit',
      minute: '2-digit',
      hourCycle: 'h23',
    }).formatToParts(date)
    const vals = Object.fromEntries(parts.filter((p) => p.type !== 'literal').map((p) => [p.type, p.value]))
    return `${vals.hour}:${vals.minute}`
  }

  function setWakeToNow() {
    document.getElementById('wakeInput').value = timeInputValue(new Date())
  }

  function showToast(msg) {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.classList.add('show')
    setTimeout(() => t.classList.remove('show'), 3500)
  }

  function formatDuration(ms) {
    const totalMinutes = Math.max(0, Math.round(Math.abs(ms) / 60000))
    const hours = Math.floor(totalMinutes / 60)
    const minutes = totalMinutes % 60
    if (hours === 0) return `${minutes}m`
    if (minutes === 0) return `${hours}h`
    return `${hours}h ${minutes}m`
  }

  function relativeLabel(session) {
    if (session.taken_at) return `Taken ${fmtTime(session.taken_at)}`
    if (session.sent) return 'Sent'
    const diff = new Date(session.scheduled_time).getTime() - Date.now()
    return diff >= 0 ? `In ${formatDuration(diff)}` : `Due ${formatDuration(diff)} ago`
  }

  function getEmoji(session) {
    return session.emoji || EMOJIS[session.session_number] || '💊'
  }

  function getPin() {
    return localStorage.getItem(PIN_KEY) || ''
  }

  function apiFetch(url, options = {}) {
    const headers = new Headers(options.headers || {})
    const pin = getPin()
    if (pin) headers.set('x-samuel-os-pin', pin)
    return fetch(url, { ...options, headers })
  }

  function showApp() {
    document.getElementById('authCard').classList.remove('visible')
    document.getElementById('appShell').classList.remove('locked')
  }

  function showAuth(message = 'PIN required.') {
    document.getElementById('appShell').classList.add('locked')
    document.getElementById('authCard').classList.add('visible')
    const err = document.getElementById('pinError')
    err.textContent = message
    err.classList.add('visible')
    document.getElementById('pinInput').focus()
  }

  async function unlockDashboard() {
    const pin = document.getElementById('pinInput').value.trim()
    localStorage.setItem(PIN_KEY, pin)
    await loadSchedule()
  }

  function normalizeSchedule(schedule = [], sessions = latestSessions) {
    const sessionByNumber = new Map((sessions || []).map((s) => [String(s.session_number), s]))
    return (schedule || []).map((row) => {
      const base = sessionByNumber.get(String(row.session_number)) || {}
      const scheduledTime = row.scheduled_time || row.scheduledTime
      return {
        ...base,
        ...row,
        scheduled_time: scheduledTime,
        wake_time: row.wake_time || row.wakeTime,
      }
    }).filter((row) => row.scheduled_time)
  }

  async function setSchedule() {
    const input = document.getElementById('wakeInput').value
    if (!input) { showToast('Pick a wake-up time first'); return }

    const btn = document.getElementById('setBtn')
    btn.disabled = true
    btn.textContent = 'Setting...'

    try {
      const res = await apiFetch('/api/wake-up', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ source: 'web', time: input, timeZone: TZ }),
      })
      if (res.status === 401) {
        localStorage.removeItem(PIN_KEY)
        showAuth('Enter your Samuel OS PIN.')
        return
      }
      const data = await res.json()
      if (!data.ok) throw new Error(data.error || 'Unknown error')
      showApp()
      renderSchedule(normalizeSchedule(data.schedule), data.wakeTime)
    } catch (err) {
      showToast('Error: ' + err.message)
    } finally {
      btn.disabled = false
      btn.textContent = 'Set schedule'
    }
  }

  async function loadSchedule() {
    try {
      const res = await apiFetch('/api/dashboard')
      if (res.status === 401) {
        localStorage.removeItem(PIN_KEY)
        showAuth('Enter your Samuel OS PIN.')
        return
      }
      const data = await res.json()
      latestSessions = data.sessions || []
      showApp()

      const schedule = normalizeSchedule(data.schedule, latestSessions)
      if (schedule.length) {
        renderSchedule(schedule)
        if (schedule[0]?.wake_time) document.getElementById('wakeInput').value = timeInputValue(new Date(schedule[0].wake_time))
      } else {
        setWakeToNow()
        showEmpty()
      }
    } catch (err) {
      showToast('Could not load Samuel OS')
      setWakeToNow()
      showEmpty()
    }
  }

  async function markTaken(id, taken) {
    try {
      const res = await apiFetch('/api/taken', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, taken }),
      })
      if (res.status === 401) {
        localStorage.removeItem(PIN_KEY)
        showAuth('Enter your Samuel OS PIN.')
        return
      }
      const data = await res.json()
      if (!data.ok) throw new Error(data.error || 'Could not update')
      await loadSchedule()
    } catch (err) {
      showToast('Error: ' + err.message)
    }
  }

  function showEmpty() {
    latestSchedule = []
    document.getElementById('sessionList').innerHTML = ''
    document.getElementById('emptyState').classList.add('visible')
    document.getElementById('statusBar').style.display = 'none'
    document.getElementById('scheduleLabel').style.display = 'none'
    document.getElementById('wakeMeta').classList.remove('visible')
  }

  function renderSchedule(schedule, wakeTimeIso) {
    if (!schedule?.length) { showEmpty(); return }
    latestSchedule = schedule
    document.getElementById('emptyState').classList.remove('visible')
    document.getElementById('statusBar').style.display = 'flex'
    document.getElementById('scheduleLabel').style.display = 'block'

    const wt = wakeTimeIso ? new Date(wakeTimeIso) : (schedule[0]?.wake_time ? new Date(schedule[0].wake_time) : null)
    const meta = document.getElementById('wakeMeta')
    if (wt) {
      const bedtime = new Date(wt.getTime() + 840 * 60000)
      meta.innerHTML = `Schedule active · Wake <strong>${fmtTime(wt)}</strong> · Sleep <strong>${fmtTime(bedtime)}</strong>`
      meta.classList.add('visible')
    }

    const list = document.getElementById('sessionList')
    list.innerHTML = ''

    let nextFound = false
    const now = Date.now()

    schedule.forEach((session, index) => {
      const sessionTime = new Date(session.scheduled_time).getTime()
      const isSent = Boolean(session.sent)
      const isNext = !isSent && !nextFound && sessionTime > now
      const isDue = !isSent && !isNext && sessionTime <= now
      if (isNext) nextFound = true

      const supplements = session.supplements || []
      const card = document.createElement('div')
      card.className = 'session-card' +
        (isSent ? ' is-sent' : '') +
        (isNext ? ' is-next' : '') +
        (isDue ? ' is-due' : '')

      card.innerHTML = `
        <div class="session-header">
          <span class="session-emoji">${escapeHtml(getEmoji(session))}</span>
          <span class="session-name">${escapeHtml(session.session_name)}</span>
          <span class="sent-badge">done</span>
          <span class="session-time">${fmtTime(session.scheduled_time)}</span>
        </div>
        <div class="session-subline relative-time" data-index="${index}">${escapeHtml(relativeLabel(session))}</div>
        <div class="session-tags">
          ${supplements.map((sup) => `<span class="tag">${escapeHtml(sup.name)}</span>`).join('')}
          ${session.fasted ? '<span class="tag tag-fasted">fasted</span>' : ''}
        </div>
        ${session.reminder_note ? `<div class="session-note">${escapeHtml(session.reminder_note)}</div>` : ''}
        ${session.id ? `<div class="session-actions"><button class="btn-taken" type="button">${isSent ? 'Undo' : 'Taken now'}</button></div>` : ''}
      `

      const action = card.querySelector('.btn-taken')
      if (action) action.addEventListener('click', () => markTaken(session.id, !isSent))
      list.appendChild(card)
    })

    updateNextPill()
  }

  function updateNextPill() {
    const nextSession = latestSchedule.find((s) => !s.sent && new Date(s.scheduled_time).getTime() > Date.now())
    const nextPill = document.getElementById('nextPill')
    if (nextSession) {
      document.getElementById('nextPillText').textContent =
        `Next: ${nextSession.session_name} at ${fmtTime(nextSession.scheduled_time)}`
      nextPill.style.display = 'flex'
    } else {
      nextPill.style.display = 'none'
    }
  }

  function updateRelativeTimes() {
    document.querySelectorAll('.relative-time').forEach((el) => {
      const session = latestSchedule[Number(el.dataset.index)]
      if (session) el.textContent = relativeLabel(session)
    })
    updateNextPill()
  }

  function tickClock() {
    const now = new Date()
    document.getElementById('liveClock').textContent = fmtTime(now)
    document.getElementById('dateBadge').textContent = fmtDate(now)
    document.getElementById('timeZoneLabel').textContent = TZ
    updateRelativeTimes()
  }

  document.getElementById('wakeInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') setSchedule()
  })
  document.getElementById('pinInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') unlockDashboard()
  })

  setWakeToNow()
  tickClock()
  setInterval(tickClock, 30000)
  loadSchedule()
</script>
</body>
</html>
