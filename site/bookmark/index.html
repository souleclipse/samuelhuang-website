<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<title>Bookmarks · Samuel Huang</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0B0C10;
    --surface: #14161C;
    --surface-2: #1B1E26;
    --line: #262932;
    --ink: #F2F3F5;
    --ink-soft: #B4B7C1;
    --ink-mute: #6E7380;
    --green: #2BC79A;
    --green-bg: #0E2018;
    --orange: #E08A6A;
    --purple: #8B93FF;
    --purple-bg: #1A1B30;
    --yellow: #F5C842;
    --red: #F08080;
    --topbar-h: 56px;
    --sidebar-w: 224px;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ────── Page wrap (max-width) ────── */
  .page-wrap { max-width: 1200px; margin: 0 auto; }

  /* ────── Topbar ────── */
  .topbar {
    height: var(--topbar-h);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px 0 20px;
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 30;
  }
  .logo {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    color: var(--ink);
    text-decoration: none;
  }
  .logo-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .search-bar {
    flex: 1;
    position: relative;
  }
  .search-bar input {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink);
    font: inherit;
    font-size: 13.5px;
    padding: 8px 12px 8px 34px;
    outline: none;
    transition: border-color .15s;
    height: 36px;
  }
  .search-bar input:focus { border-color: var(--green); }
  .search-bar .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-mute);
    font-size: 14px;
    pointer-events: none;
  }

  .topbar-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .view-toggle {
    display: flex;
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
  }
  .view-btn {
    background: var(--surface-2);
    border: 0;
    color: var(--ink-mute);
    cursor: pointer;
    font: inherit;
    font-size: 14px;
    padding: 7px 11px;
    transition: background .12s, color .12s;
    line-height: 1;
  }
  .view-btn + .view-btn { border-left: 1px solid var(--line); }
  .view-btn:hover { color: var(--ink); }
  .view-btn.active { background: var(--surface); color: var(--green); }

  /* ────── Add bar (persistent, always visible) ────── */
  .add-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
  }
  .add-bar-input {
    flex: 1;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink);
    font: inherit;
    font-size: 13.5px;
    padding: 8px 12px;
    outline: none;
    transition: border-color .15s;
    height: 36px;
    min-width: 0;
  }
  .add-bar-input:focus { border-color: var(--green); }
  .add-bar-input::placeholder { color: var(--ink-mute); }
  .add-bar-select {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink-soft);
    font: inherit;
    font-size: 12.5px;
    padding: 0 10px;
    height: 36px;
    cursor: pointer;
    outline: none;
    flex-shrink: 0;
    max-width: 160px;
  }
  .add-bar-select:focus { border-color: var(--green); }
  .add-bar-btn {
    background: var(--green);
    color: #0B0C10;
    border: none;
    border-radius: 8px;
    padding: 0 16px;
    height: 36px;
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .15s;
    flex-shrink: 0;
  }
  .add-bar-btn:hover { opacity: .85; }
  .add-bar-btn:disabled { opacity: .4; cursor: not-allowed; }
  .add-bar-status {
    font-size: 12px;
    color: var(--ink-mute);
    white-space: nowrap;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 220px;
  }
  .add-bar-status .spinner {
    width: 11px; height: 11px;
    border: 2px solid var(--line);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }
  .add-bar-status.ok { color: var(--green); }
  .add-bar-status.err { color: var(--red); }

  /* ────── Auth overlay ────── */
  .auth-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(7,8,11,.96);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .auth-overlay.visible { display: flex; }
  .auth-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 36px 32px 32px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    position: relative;
  }
  .auth-circle {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--green-bg);
    border: 2px solid var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 22px;
    box-shadow: 0 0 0 8px rgba(43,199,154,.08);
  }
  .auth-circle svg { width: 30px; height: 30px; color: var(--green); }
  .auth-card h2 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -.01em;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .auth-sub {
    font-size: 13px;
    color: var(--ink-mute);
    margin-bottom: 24px;
  }
  .pin-form { display: flex; flex-direction: column; gap: 10px; }
  .pin-form input {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--ink);
    font: inherit;
    font-size: 16px;
    padding: 14px 16px;
    outline: none;
    text-align: center;
    letter-spacing: .08em;
    transition: border-color .15s, box-shadow .15s;
  }
  .pin-form input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(43,199,154,.15); }
  .btn-unlock {
    background: var(--green);
    color: #0B0C10;
    border: none;
    border-radius: 12px;
    padding: 14px 0;
    width: 100%;
    font: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .btn-unlock:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
  .btn-unlock:disabled { opacity: .4; cursor: not-allowed; }
  .pin-error { color: var(--red); font-size: 13px; margin-top: 10px; display: none; }
  .pin-error.visible { display: block; }

  /* ────── Shell ────── */
  .app-shell { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: calc(100vh - var(--topbar-h)); }
  .app-shell.locked { display: none; }

  /* ────── Sidebar ────── */
  .sidebar {
    border-right: 1px solid var(--line);
    padding: 12px 10px;
    position: sticky;
    top: var(--topbar-h);
    height: calc(100vh - var(--topbar-h));
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--line) transparent;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 9px;
    width: 100%;
    border: 0;
    background: transparent;
    color: var(--ink-soft);
    font: inherit;
    font-size: 13.5px;
    text-align: left;
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .1s, color .1s;
    position: relative;
  }
  .nav-item:hover { background: var(--surface-2); color: var(--ink); }
  .nav-item.active { background: var(--surface); color: var(--green); font-weight: 600; }
  .nav-item .icon { font-size: 14px; flex-shrink: 0; width: 18px; text-align: center; }
  .nav-item .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nav-item .count {
    font-size: 11px;
    color: var(--ink-mute);
    background: var(--surface-2);
    border-radius: 999px;
    padding: 1px 7px;
    flex-shrink: 0;
  }
  .nav-item.active .count { color: var(--green); }

  .sidebar-sep {
    height: 1px;
    background: var(--line);
    margin: 8px 4px;
  }

  /* Expand/collapse arrow */
  .nav-item .arrow {
    font-size: 9px;
    color: var(--ink-mute);
    flex-shrink: 0;
    transition: transform .2s;
    margin-right: 2px;
  }
  .nav-item.expanded .arrow { transform: rotate(90deg); }

  /* Sub-nav (children of a collection) */
  .sub-nav {
    padding-left: 10px;
    overflow: hidden;
    max-height: 0;
    transition: max-height .25s ease;
  }
  .sub-nav.open { max-height: 500px; }
  .sub-nav .nav-item { font-size: 12.5px; padding: 5px 10px; }
  .sub-nav .nav-item .icon { font-size: 12px; width: 14px; }

  /* ────── Main ────── */
  .main { min-width: 0; display: flex; flex-direction: column; }

  /* Sub-panel: tag filter bar shown when inside a collection that has tags */
  .sub-panel {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
    overflow-x: auto;
    scrollbar-width: none;
    flex-wrap: nowrap;
  }
  .sub-panel.visible { display: flex; }
  .sub-panel::-webkit-scrollbar { display: none; }
  .sub-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--ink-mute);
    flex-shrink: 0;
  }
  .tag-chip {
    flex-shrink: 0;
    border: 1px solid var(--line);
    background: var(--surface-2);
    color: var(--ink-soft);
    border-radius: 999px;
    padding: 4px 12px;
    font: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: border-color .12s, color .12s, background .12s;
    white-space: nowrap;
  }
  .tag-chip:hover { color: var(--ink); border-color: var(--ink-soft); }
  .tag-chip.active { color: var(--green); border-color: var(--green); background: var(--green-bg); }

  /* ────── Sub-collection grid ────── */
  .subcol-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    padding: 14px 20px 4px;
  }
  .subcol-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .subcol-card:hover { border-color: var(--green); background: var(--green-bg); }
  .subcol-card .sc-icon { font-size: 22px; }
  .subcol-card .sc-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .subcol-card .sc-count { font-size: 11.5px; color: var(--ink-mute); }

  .main-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px 8px;
    gap: 12px;
  }
  .main-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: .1em;
    white-space: nowrap;
  }
  .toolbar-right { display: flex; align-items: center; gap: 8px; }
  .result-count {
    font-size: 12px;
    color: var(--ink-mute);
  }
  .sort-select {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--ink-soft);
    font: inherit;
    font-size: 12px;
    padding: 4px 8px;
    cursor: pointer;
    outline: none;
    height: 28px;
  }
  .sort-select:focus { border-color: var(--green); }

  .main-body { flex: 1; padding: 0 20px 80px; }

  /* ────── Card grid ────── */
  .grid-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
    padding-top: 4px;
  }
  .bm-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    transition: border-color .15s;
  }
  .bm-card:hover { border-color: #3A3F4E; }
  .bm-card-head { display: flex; align-items: flex-start; gap: 8px; }
  .bm-favicon {
    width: 18px; height: 18px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
    background: var(--surface-2);
    object-fit: cover;
  }
  .bm-title {
    font-size: 13.5px;
    font-weight: 600;
    line-height: 1.4;
    flex: 1;
    min-width: 0;
  }
  .bm-title a { color: var(--ink); text-decoration: none; }
  .bm-title a:hover { color: var(--green); }
  .bm-domain { font-size: 11.5px; color: var(--ink-mute); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bm-desc {
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .bm-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-top: auto;
  }
  .bm-tags { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; min-width: 0; }
  .bm-tag {
    font-size: 10.5px;
    color: var(--ink-mute);
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1px 6px;
    white-space: nowrap;
  }
  .bm-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 6px;
    color: var(--ink-mute);
    cursor: pointer;
    font: inherit;
    font-size: 13px;
    padding: 4px 6px;
    transition: color .12s, border-color .12s, background .12s;
    line-height: 1;
  }
  .icon-btn:hover { color: var(--ink); background: var(--surface-2); border-color: var(--line); }
  .icon-btn.fav.starred { color: var(--yellow); }
  .icon-btn.danger:hover { color: var(--red); border-color: #4A2020; }

  /* ────── List view ────── */
  .list-view { display: flex; flex-direction: column; padding-top: 4px; }
  .list-row {
    display: grid;
    grid-template-columns: 16px 16px 18px minmax(0,1fr) 130px auto;
    align-items: start;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    transition: background .1s;
  }
  .list-row:hover { background: var(--surface); }
  .list-row:last-child { border-bottom: 0; }
  .list-favicon {
    width: 16px; height: 16px;
    border-radius: 3px;
    background: var(--surface-2);
    object-fit: cover;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .list-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .list-title {
    font-size: 13.5px;
    font-weight: 550;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .list-title a { color: var(--ink); text-decoration: none; }
  .list-title a:hover { color: var(--green); }
  .list-desc {
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .list-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    overflow: hidden;
  }
  .list-domain { font-size: 11.5px; color: var(--ink-mute); white-space: nowrap; }
  .list-tags { display: flex; gap: 4px; overflow: hidden; flex: 1; }
  .list-collection {
    font-size: 11.5px;
    color: var(--ink-mute);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: right;
    padding-top: 3px;
  }
  .list-actions { display: flex; gap: 3px; justify-content: flex-end; padding-top: 1px; }

  /* ────── Move-to popover ────── */
  .move-select {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--ink);
    font: inherit;
    font-size: 12px;
    padding: 4px 6px;
    cursor: pointer;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ────── Sort history panel ────── */
  .history-panel { padding: 20px; display: flex; flex-direction: column; gap: 8px; }
  .history-row {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .history-url { font-size: 12.5px; color: var(--ink-soft); word-break: break-all; margin-bottom: 6px; }
  .history-meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--ink-mute); }
  .history-meta strong { color: var(--green); }

  /* ────── Empty / loading ────── */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--ink-mute);
    display: none;
  }
  .empty-state.visible { display: block; }
  .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }
  .loading { text-align: center; padding: 60px; color: var(--ink-mute); font-size: 14px; }

  /* ────── Toast ────── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1A2E1F;
    border: 1px solid #1E4A2A;
    color: var(--green);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    z-index: 200;
    transition: transform .25s ease;
    white-space: nowrap;
  }
  .toast.err { background: #2A1616; border-color: #4A2020; color: var(--red); }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ────── Drag handle ────── */
  .drag-handle {
    color: var(--ink-mute);
    cursor: grab;
    font-size: 13px;
    line-height: 1;
    flex-shrink: 0;
    user-select: none;
    opacity: 0;
    transition: opacity .15s;
    padding: 2px 3px;
  }
  .bm-card:hover .drag-handle,
  .list-row:hover .drag-handle { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }
  .sortable-ghost { opacity: .35; }
  .sortable-drag { opacity: .9; box-shadow: 0 8px 24px rgba(0,0,0,.5); }

  /* ────── Checkbox ────── */
  .bm-check {
    appearance: none;
    width: 15px; height: 15px;
    border: 1.5px solid var(--line);
    border-radius: 4px;
    background: var(--surface-2);
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    transition: border-color .12s, background .12s;
  }
  .bm-check:checked {
    background: var(--green);
    border-color: var(--green);
  }
  .bm-check:checked::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #0B0C10;
    font-weight: 700;
  }
  /* Show checkboxes on hover or when any is checked */
  .bm-check { opacity: 0; transition: opacity .15s, border-color .12s, background .12s; }
  .bm-card:hover .bm-check,
  .list-row:hover .bm-check,
  .bm-check:checked,
  .has-selection .bm-check { opacity: 1; }

  /* Clickable card */
  .bm-card { cursor: pointer; }
  .bm-card.selected { border-color: var(--green); background: var(--green-bg); }
  .list-row.selected { background: var(--green-bg); }

  /* ────── Multi-select bar ────── */
  .multi-bar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    transition: transform .25s cubic-bezier(.2,.8,.4,1);
    white-space: nowrap;
  }
  .multi-bar.show { transform: translateX(-50%) translateY(0); }
  .multi-bar-count { font-size: 13px; font-weight: 600; color: var(--ink-soft); }
  .multi-bar-btn {
    background: var(--green);
    color: #0B0C10;
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s;
  }
  .multi-bar-btn:hover { opacity: .85; }
  .multi-bar-clear {
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink-mute);
    padding: 7px 12px;
    font: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  .multi-bar-clear:hover { color: var(--ink); border-color: var(--ink-soft); }

  /* ────── Mobile ────── */
  @media (max-width: 820px) {
    :root { --sidebar-w: 0px; }
    .sidebar { display: none; }
    .app-shell { grid-template-columns: 1fr; }
    .sub-panel { padding: 8px 14px; }
    .add-bar { padding: 8px 14px; gap: 6px; }
    .add-bar-select { max-width: 120px; }
    .add-bar-status { display: none; }
    .main-toolbar { padding: 10px 14px 6px; }
    .main-body { padding: 0 14px 80px; }
    .grid-view { grid-template-columns: 1fr 1fr; }
    .list-row { grid-template-columns: 16px 14px 16px minmax(0,1fr) auto; }
    .list-row .list-collection { display: none; }
    .subcol-grid { padding: 10px 14px 4px; }
  }
  @media (max-width: 540px) {
    .grid-view { grid-template-columns: 1fr; }
    .search-bar { max-width: none; }
    .add-bar-select { display: none; }
  }
</style>
</head>
<body>

<div class="page-wrap">
<!-- Topbar -->
<header class="topbar">
  <a class="logo" href="/glossary"><span class="logo-dot"></span>Bookmarks</a>
  <div class="search-bar">
    <span class="search-icon">⌕</span>
    <input id="searchInput" type="text" placeholder="Search title, URL, tags…" autocomplete="off">
  </div>
  <div class="topbar-actions">
    <div class="view-toggle" role="group" aria-label="View mode">
      <button class="view-btn active" id="btnGrid" title="Card view" onclick="setView('grid')">⊞</button>
      <button class="view-btn" id="btnList" title="List view" onclick="setView('list')">≡</button>
    </div>
  </div>
</header>

<!-- Auth overlay -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <div class="auth-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h2>Private access</h2>
    <p class="auth-sub">New IP detected. Enter your password to continue.</p>
    <div class="pin-form">
      <input id="pinInput" type="password" placeholder="Password" autocomplete="current-password">
      <button class="btn-unlock" id="unlockBtn" onclick="unlockApp()">Unlock</button>
    </div>
    <div class="pin-error" id="pinError"></div>
  </div>
</div>

<!-- App shell -->
<div class="app-shell locked" id="appShell">

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <button class="nav-item active" data-filter="all" onclick="selectFilter('all')">
      <span class="icon">📚</span><span class="label">All bookmarks</span><span class="count" id="countAll">–</span>
    </button>
    <button class="nav-item" data-filter="favorites" onclick="selectFilter('favorites')">
      <span class="icon">⭐</span><span class="label">Favorites</span><span class="count" id="countFav">–</span>
    </button>
    <div class="sidebar-sep"></div>
    <div id="collectionNav"><div style="padding:8px 10px;font-size:12px;color:var(--ink-mute)">Loading…</div></div>
    <div class="sidebar-sep"></div>
    <button class="nav-item" data-filter="history" onclick="selectFilter('history')">
      <span class="icon">🕘</span><span class="label">Sort history</span>
    </button>
  </nav>

  <!-- Main -->
  <div class="main" id="mainArea">

    <!-- Persistent add bar -->
    <div class="add-bar" id="addBar">
      <input class="add-bar-input" id="addUrl" type="url" placeholder="Paste URL to add bookmark… (Enter to AI-sort)" autocomplete="off">
      <select class="add-bar-select" id="addCollection" title="Collection (optional — overrides AI sort)">
        <option value="">AI sort</option>
      </select>
      <button class="add-bar-btn" id="addBtn" onclick="addBookmark()">Add</button>
      <div class="add-bar-status" id="addStatus"></div>
    </div>

    <!-- Sub-panel (tag filters, visible when inside a collection with tags) -->
    <div class="sub-panel" id="subPanel">
      <span class="sub-label">Filter:</span>
      <button class="tag-chip active" data-tag="" onclick="selectTag(this,'')">All</button>
    </div>

    <!-- Sub-collection grid (shown when a parent collection is selected) -->
    <div id="subColGrid" style="display:none"></div>

    <!-- Toolbar -->
    <div class="main-toolbar" id="mainToolbar">
      <span class="main-title" id="mainTitle">All bookmarks</span>
      <div class="toolbar-right">
        <span class="result-count" id="resultCount"></span>
        <select class="sort-select" id="sortSelect" onchange="applyFilters()">
          <option value="manual">Manual order</option>
          <option value="date-desc">Newest first</option>
          <option value="date-asc">Oldest first</option>
          <option value="title-asc">Title A→Z</option>
          <option value="title-desc">Title Z→A</option>
        </select>
      </div>
    </div>

    <!-- Bookmark content -->
    <div class="main-body" id="mainBody">
      <div id="gridContainer" class="grid-view"><div class="loading">Loading…</div></div>
      <div id="listContainer" class="list-view" style="display:none"></div>
      <div class="empty-state" id="emptyState">
        <div class="emoji">🔖</div>
        <p>No bookmarks here yet.<br>Paste a URL above to add your first one.</p>
      </div>

      <!-- History panel -->
      <div class="history-panel" id="historyPanel" style="display:none"></div>
    </div>
  </div>
</div>

</div><!-- /page-wrap -->

<!-- Multi-select bar -->
<div class="multi-bar" id="multiBar">
  <span class="multi-bar-count" id="multiCount">0 selected</span>
  <button class="multi-bar-btn" onclick="openSelected()">Open in tabs</button>
  <button class="multi-bar-clear" onclick="clearSelection()">Clear</button>
</div>

<div class="toast" id="toast"></div>

<script>
  let collections = []
  let flatCollections = []
  let currentFilter = 'all'
  let currentSlug = null
  let currentTag = ''
  let currentView = 'grid'
  let allBookmarks = []
  let searchTimer
  let selectedIds = new Set()
  let sortableGrid = null
  let sortableList = null

  // ── Helpers ──────────────────────────────
  const esc = (v) => String(v ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
  const domain = (url) => { try { return new URL(url).hostname.replace(/^www\./,'') } catch { return '' } }
  const favicon = (b) => b.favicon_url || (domain(b.url) ? `https://www.google.com/s2/favicons?sz=64&domain=${encodeURIComponent(domain(b.url))}` : '')
  const fmtDate = (iso) => { try { return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) } catch { return '' } }

  function showToast(msg, type='') {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.className = 'toast show' + (type ? ' '+type : '')
    clearTimeout(t._timer)
    t._timer = setTimeout(() => t.classList.remove('show'), 3000)
  }

  function apiFetch(url, opts={}) {
    return fetch(url, { ...opts, credentials: 'same-origin', headers: new Headers(opts.headers||{}) })
  }

  // ── Auth ──────────────────────────────────
  function showAuth(msg='') {
    document.getElementById('appShell').classList.add('locked')
    document.getElementById('authOverlay').classList.add('visible')
    if (msg) {
      const e = document.getElementById('pinError'); e.textContent = msg; e.classList.add('visible')
    }
    setTimeout(() => { const i = document.getElementById('pinInput'); if (i) i.focus() }, 50)
  }

  function showApp() {
    document.getElementById('authOverlay').classList.remove('visible')
    document.getElementById('appShell').classList.remove('locked')
  }

  async function checkAuth() {
    try {
      const res = await fetch('/api/dashboard-auth', { credentials: 'same-origin' })
      const d = await res.json()
      if (!d.authenticated) { showAuth('Enter your dashboard password.'); return false }
      showApp(); return true
    } catch { showAuth('Could not check access.'); return false }
  }

  async function unlockApp() {
    const pass = document.getElementById('pinInput').value
    const btn = document.getElementById('unlockBtn')
    btn.disabled = true; btn.textContent = '…'
    try {
      const res = await fetch('/api/dashboard-auth', {
        method: 'POST', credentials: 'same-origin',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ password: pass }),
      })
      if (!res.ok) { showAuth('Incorrect password.'); return }
      document.getElementById('pinInput').value = ''
      document.getElementById('pinError').classList.remove('visible')
      showApp(); await bootstrap()
    } catch { showAuth('Could not unlock.') }
    finally { btn.disabled = false; btn.textContent = 'Unlock' }
  }

  // ── View toggle ────────────────────────────
  function setView(v) {
    currentView = v
    document.getElementById('btnGrid').classList.toggle('active', v === 'grid')
    document.getElementById('btnList').classList.toggle('active', v === 'list')
    document.getElementById('gridContainer').style.display = v === 'grid' ? '' : 'none'
    document.getElementById('listContainer').style.display = v === 'list' ? '' : 'none'
    renderBookmarks(allBookmarks)
  }

  // ── Sidebar ────────────────────────────────
  let openParentSlug = null  // track which parent is expanded

  function parentItemHtml(c) {
    const hasChildren = c.children && c.children.length > 0
    const arrow = hasChildren ? `<span class="arrow">▶</span>` : ''
    return `
      <button class="nav-item" data-filter="collection" data-slug="${esc(c.slug)}" data-has-children="${hasChildren}">
        <span class="icon">${esc(c.icon||'📁')}</span>
        <span class="label">${esc(c.name)}</span>
        ${arrow}
        <span class="count">${c.count}</span>
      </button>
      ${hasChildren ? `<div class="sub-nav" id="sub-${esc(c.slug)}">
        ${c.children.map((ch) => `
          <button class="nav-item" data-filter="collection" data-slug="${esc(ch.slug)}" data-parent="${esc(c.slug)}">
            <span class="icon">${esc(ch.icon||'📁')}</span>
            <span class="label">${esc(ch.name)}</span>
            <span class="count">${ch.count}</span>
          </button>`).join('')}
      </div>` : ''}
    `
  }

  function renderSidebar() {
    const nav = document.getElementById('collectionNav')
    nav.innerHTML = collections.map(parentItemHtml).join('')
    document.getElementById('countAll').textContent = collections.reduce((s,c) => s+c.count, 0)

    // Wire click handlers (parent items toggle expand + navigate; child items just navigate)
    nav.querySelectorAll('.nav-item').forEach((btn) => {
      btn.addEventListener('click', () => {
        const slug = btn.dataset.slug
        const hasChildren = btn.dataset.hasChildren === 'true'
        if (hasChildren) {
          const subNav = document.getElementById(`sub-${slug}`)
          const isOpen = subNav.classList.contains('open')
          // Collapse all, then open clicked
          nav.querySelectorAll('.sub-nav').forEach((el) => el.classList.remove('open'))
          nav.querySelectorAll('.nav-item').forEach((el) => el.classList.remove('expanded'))
          if (!isOpen) {
            subNav.classList.add('open')
            btn.classList.add('expanded')
            openParentSlug = slug
          } else {
            openParentSlug = null
          }
        }
        selectFilter('collection', slug)
      })
    })
  }

  function setSidebarActive(filter, slug) {
    document.querySelectorAll('.nav-item').forEach((el) => {
      const match = el.dataset.filter === filter && (filter !== 'collection' || el.dataset.slug === slug)
      el.classList.toggle('active', match)
    })
    // Auto-expand parent when a child is selected
    if (filter === 'collection') {
      const btn = document.querySelector(`.nav-item[data-slug="${slug}"]`)
      const parentSlug = btn?.dataset.parent
      if (parentSlug) {
        const subNav = document.getElementById(`sub-${parentSlug}`)
        const parentBtn = document.querySelector(`.nav-item[data-slug="${parentSlug}"]`)
        if (subNav && !subNav.classList.contains('open')) {
          subNav.classList.add('open')
          parentBtn?.classList.add('expanded')
        }
      }
    }
  }

  // ── Sub-panel (tag filters) ────────────────
  function buildSubPanel(bookmarks) {
    const panel = document.getElementById('subPanel')
    if (currentFilter !== 'collection') { panel.classList.remove('visible'); return }

    const tagSet = new Set()
    bookmarks.forEach((b) => (b.tags||[]).forEach((t) => t && tagSet.add(t)))
    if (!tagSet.size) { panel.classList.remove('visible'); return }

    const tags = [...tagSet].sort()
    panel.innerHTML = `
      <span class="sub-label">Sub-filter:</span>
      <button class="tag-chip${currentTag===''?' active':''}" data-tag="" onclick="selectTag(this,'')">All</button>
      ${tags.map((t) => `<button class="tag-chip${currentTag===t?' active':''}" data-tag="${esc(t)}" onclick="selectTag(this,'${esc(t)}')">${esc(t)}</button>`).join('')}
    `
    panel.classList.add('visible')
  }

  function selectTag(btn, tag) {
    currentTag = tag
    document.querySelectorAll('#subPanel .tag-chip').forEach((el) => el.classList.toggle('active', el.dataset.tag === tag))
    applyFilters()
  }

  // ── Filter / load ─────────────────────────
  async function selectFilter(filter, slug) {
    currentFilter = filter; currentSlug = slug||null; currentTag = ''
    setSidebarActive(filter, slug)

    if (filter === 'history') {
      document.getElementById('mainTitle').textContent = 'Sort history'
      document.getElementById('resultCount').textContent = ''
      document.getElementById('gridContainer').style.display = 'none'
      document.getElementById('listContainer').style.display = 'none'
      document.getElementById('emptyState').classList.remove('visible')
      document.getElementById('subPanel').classList.remove('visible')
      document.getElementById('historyPanel').style.display = 'flex'
      document.getElementById('mainToolbar').style.display = 'flex'
      loadHistory(); return
    }

    document.getElementById('historyPanel').style.display = 'none'
    setView(currentView)
    await loadBookmarks()
  }

  async function loadBookmarks() {
    const params = new URLSearchParams()
    if (currentFilter === 'favorites') params.set('favorite','1')
    if (currentFilter === 'collection' && currentSlug) params.set('collection', currentSlug)
    const q = document.getElementById('searchInput').value.trim()
    if (q) params.set('q', q)

    const gridEl = document.getElementById('gridContainer')
    const listEl = document.getElementById('listContainer')
    if (currentView === 'grid') gridEl.innerHTML = '<div class="loading">Loading…</div>'
    else listEl.innerHTML = '<div class="loading">Loading…</div>'
    document.getElementById('emptyState').classList.remove('visible')

    try {
      const res = await apiFetch(`/api/bookmarks?${params}`)
      if (res.status === 401) { showAuth('Enter your dashboard password.'); return }
      const data = await res.json()
      allBookmarks = data.bookmarks || []
      renderSubColGrid()
      buildSubPanel(allBookmarks)
      applyFilters()
    } catch {
      showToast('Could not load bookmarks', 'err')
    }
  }

  function applyFilters() {
    let items = allBookmarks
    if (currentTag) items = items.filter((b) => (b.tags||[]).includes(currentTag))
    const sort = document.getElementById('sortSelect')?.value || 'manual'
    items = [...items].sort((a, b) => {
      if (sort === 'manual')     return (a.sort_order||0) - (b.sort_order||0)
      if (sort === 'date-asc')   return new Date(a.created_at) - new Date(b.created_at)
      if (sort === 'title-asc')  return (a.title||'').localeCompare(b.title||'')
      if (sort === 'title-desc') return (b.title||'').localeCompare(a.title||'')
      return new Date(b.created_at) - new Date(a.created_at)
    })
    renderBookmarks(items)
  }

  function setTitle() {
    if (currentFilter === 'favorites') { document.getElementById('mainTitle').textContent = 'Favorites'; return }
    if (currentFilter === 'collection') {
      const c = flatCollections.find((x) => x.slug === currentSlug) || collections.find((x) => x.slug === currentSlug)
      document.getElementById('mainTitle').textContent = c ? `${c.icon||''} ${c.name}`.trim() : 'Collection'
      return
    }
    document.getElementById('mainTitle').textContent = 'All bookmarks'
  }

  function renderBookmarks(items) {
    setTitle()
    document.getElementById('resultCount').textContent = items.length ? `${items.length} bookmarks` : ''
    const gridEl = document.getElementById('gridContainer')
    const listEl = document.getElementById('listContainer')
    const emptyEl = document.getElementById('emptyState')

    // Reflect selection state on containers
    const hasSelection = selectedIds.size > 0
    document.querySelectorAll('.grid-view,.list-view').forEach((el) =>
      el.classList.toggle('has-selection', hasSelection))

    if (!items.length) {
      gridEl.innerHTML = ''; listEl.innerHTML = ''
      emptyEl.classList.add('visible')
      destroySortables(); return
    }
    emptyEl.classList.remove('visible')

    if (currentView === 'grid') {
      gridEl.innerHTML = items.map(cardHtml).join('')
      listEl.innerHTML = ''
      wireActions(gridEl)
      initSortable(gridEl, 'grid')
    } else {
      listEl.innerHTML = items.map(rowHtml).join('')
      gridEl.innerHTML = ''
      wireActions(listEl)
      initSortable(listEl, 'list')
    }
  }

  function destroySortables() {
    if (sortableGrid) { sortableGrid.destroy(); sortableGrid = null }
    if (sortableList) { sortableList.destroy(); sortableList = null }
  }

  function initSortable(container, type) {
    destroySortables()
    if (typeof Sortable === 'undefined') return
    const s = Sortable.create(container, {
      handle: '.drag-handle',
      animation: 150,
      ghostClass: 'sortable-ghost',
      dragClass: 'sortable-drag',
      onEnd() {
        // Switch to manual sort mode
        const sel = document.getElementById('sortSelect')
        if (sel) sel.value = 'manual'
        // Collect new order of IDs from DOM
        const ids = [...container.querySelectorAll('[data-id]')].map((el) => el.dataset.id)
        // Update local sort_order
        ids.forEach((id, i) => {
          const bm = allBookmarks.find((b) => b.id === id)
          if (bm) bm.sort_order = (i + 1) * 10
        })
        // Persist to DB
        apiFetch('/api/bookmarks', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reorder: ids }),
        }).catch(() => showToast('Could not save order', 'err'))
      },
    })
    if (type === 'grid') sortableGrid = s
    else sortableList = s
  }

  // ── Card HTML ─────────────────────────────
  function cardHtml(b) {
    const tags = (b.tags||[]).slice(0,4).map((t) => `<span class="bm-tag">${esc(t)}</span>`).join('')
    const sel = selectedIds.has(b.id)
    return `
      <div class="bm-card${sel?' selected':''}" data-id="${b.id}" data-url="${esc(b.url)}">
        <div class="bm-card-head">
          <span class="drag-handle" title="Drag to reorder">⠿</span>
          <input type="checkbox" class="bm-check" data-action="check" ${sel?'checked':''} title="Select">
          <img class="bm-favicon" src="${esc(favicon(b))}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
          <div style="min-width:0;flex:1">
            <div class="bm-title">${esc(b.title||b.url)}</div>
            <div class="bm-domain">${esc(domain(b.url))}</div>
          </div>
        </div>
        ${b.description && b.description!=='Unable to crawl' ? `<div class="bm-desc">${esc(b.description)}</div>` : ''}
        <div class="bm-footer">
          <div class="bm-tags">${tags}</div>
          <div class="bm-actions">
            <button class="icon-btn fav ${b.is_favorite?'starred':''}" title="Favorite" data-action="fav">${b.is_favorite?'★':'☆'}</button>
            <button class="icon-btn danger" title="Delete" data-action="del">✕</button>
          </div>
        </div>
      </div>`
  }

  // ── List row HTML ─────────────────────────
  function rowHtml(b) {
    const tags = (b.tags||[]).slice(0,3).map((t) => `<span class="bm-tag">${esc(t)}</span>`).join('')
    const cname = b.collection ? `${esc(b.collection.icon||'')} ${esc(b.collection.name)}`.trim() : ''
    const desc = b.description && b.description !== 'Unable to crawl' ? b.description : ''
    const sel = selectedIds.has(b.id)
    return `
      <div class="list-row${sel?' selected':''}" data-id="${b.id}" data-url="${esc(b.url)}">
        <span class="drag-handle" title="Drag to reorder">⠿</span>
        <input type="checkbox" class="bm-check" data-action="check" ${sel?'checked':''} title="Select">
        <img class="list-favicon" src="${esc(favicon(b))}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
        <div class="list-info">
          <div class="list-title">${esc(b.title||b.url)}</div>
          ${desc ? `<div class="list-desc">${esc(desc)}</div>` : ''}
          <div class="list-meta">
            <span class="list-domain">${esc(domain(b.url))}</span>
            <div class="list-tags">${tags}</div>
          </div>
        </div>
        <span class="list-collection">${cname}</span>
        <div class="list-actions">
          <button class="icon-btn fav ${b.is_favorite?'starred':''}" title="Favorite" data-action="fav">${b.is_favorite?'★':'☆'}</button>
          <button class="icon-btn danger" title="Delete" data-action="del">✕</button>
        </div>
      </div>`
  }

  function collectionOptions(selectedId) {
    return collections.map((c) =>
      `<option value="${esc(c.slug)}" ${c.id===selectedId?'selected':''}>${esc(c.icon||'')} ${esc(c.name)}</option>`
    ).join('')
  }

  function wireActions(container) {
    // Whole card/row click → open URL (stop on buttons/inputs)
    container.querySelectorAll('[data-id]').forEach((card) => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('button,input,select,a,.drag-handle')) return
        const url = card.dataset.url
        if (url) window.open(url, '_blank', 'noopener,noreferrer')
      })
    })

    container.querySelectorAll('[data-action="check"]').forEach((chk) => {
      chk.addEventListener('change', (e) => {
        e.stopPropagation()
        const card = chk.closest('[data-id]')
        const id = card.dataset.id
        if (chk.checked) selectedIds.add(id)
        else selectedIds.delete(id)
        card.classList.toggle('selected', chk.checked)
        updateMultiBar()
        // Toggle has-selection class on container
        container.classList.toggle('has-selection', selectedIds.size > 0)
      })
    })

    container.querySelectorAll('[data-action="fav"]').forEach((btn) => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation()
        const card = btn.closest('[data-id]')
        const bm = allBookmarks.find((b) => b.id === card.dataset.id)
        if (!bm) return
        const next = !bm.is_favorite
        await patchBookmark(bm.id, { is_favorite: next })
        bm.is_favorite = next
        btn.textContent = next ? '★' : '☆'
        btn.classList.toggle('starred', next)
      })
    })

    container.querySelectorAll('[data-action="del"]').forEach((btn) => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation()
        if (!confirm('Delete this bookmark?')) return
        const card = btn.closest('[data-id]')
        await apiFetch('/api/bookmarks', {
          method: 'DELETE', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ id: card.dataset.id }),
        })
        card.remove()
        selectedIds.delete(card.dataset.id)
        allBookmarks = allBookmarks.filter((b) => b.id !== card.dataset.id)
        showToast('Deleted')
        loadCollections()
        updateMultiBar()
        document.getElementById('resultCount').textContent = allBookmarks.length ? `${allBookmarks.length} bookmarks` : ''
        if (!allBookmarks.length) document.getElementById('emptyState').classList.add('visible')
      })
    })
  }

  // ── Multi-select ──────────────────────────
  function updateMultiBar() {
    const bar = document.getElementById('multiBar')
    const n = selectedIds.size
    document.getElementById('multiCount').textContent = `${n} selected`
    bar.classList.toggle('show', n > 0)
  }

  function openSelected() {
    for (const id of selectedIds) {
      const bm = allBookmarks.find((b) => b.id === id)
      if (bm?.url) window.open(bm.url, '_blank', 'noopener,noreferrer')
    }
    clearSelection()
  }

  function clearSelection() {
    selectedIds.clear()
    document.querySelectorAll('.bm-check').forEach((c) => { c.checked = false })
    document.querySelectorAll('[data-id]').forEach((el) => el.classList.remove('selected'))
    document.querySelectorAll('.grid-view,.list-view').forEach((el) => el.classList.remove('has-selection'))
    updateMultiBar()
  }

  async function patchBookmark(id, fields) {
    const res = await apiFetch('/api/bookmarks', {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id, ...fields }),
    })
    if (res.status === 401) { showAuth('Session expired.') }
    return res.json()
  }

  // ── Collections ───────────────────────────
  async function loadCollections() {
    try {
      const res = await apiFetch('/api/bookmark-collections')
      if (res.status === 401) { showAuth(); return }
      const data = await res.json()
      collections = data.collections || []
      flatCollections = data.flat || []
      renderSidebar()
      populateAddBarSelect()
      document.getElementById('countFav').textContent = allBookmarks.filter((b) => b.is_favorite).length || 0
    } catch { showToast('Could not load collections', 'err') }
  }

  function populateAddBarSelect() {
    const sel = document.getElementById('addCollection')
    const prev = sel.value
    sel.innerHTML = '<option value="">AI sort</option>'
    for (const c of flatCollections) {
      const parent = c.parent_id ? flatCollections.find((p) => p.id === c.parent_id) : null
      const label = parent ? `${parent.icon||''} ${parent.name} › ${c.name}` : `${c.icon||''} ${c.name}`
      const opt = document.createElement('option')
      opt.value = c.slug
      opt.textContent = label.trim()
      sel.appendChild(opt)
    }
    if (prev) sel.value = prev
  }

  // ── Sub-collection grid ───────────────────
  function renderSubColGrid() {
    const el = document.getElementById('subColGrid')
    if (currentFilter !== 'collection' || !currentSlug) { el.style.display = 'none'; return }
    const parent = collections.find((c) => c.slug === currentSlug)
    if (!parent || !parent.children || !parent.children.length) { el.style.display = 'none'; return }
    el.style.display = ''
    el.innerHTML = `<div class="subcol-grid">${parent.children.map((ch) => `
      <div class="subcol-card" onclick="selectFilter('collection','${esc(ch.slug)}')">
        <div class="sc-icon">${esc(ch.icon||'📁')}</div>
        <div class="sc-name">${esc(ch.name)}</div>
        <div class="sc-count">${ch.count} bookmark${ch.count!==1?'s':''}</div>
      </div>`).join('')}</div>`
  }

  // ── History ───────────────────────────────
  async function loadHistory() {
    const panel = document.getElementById('historyPanel')
    panel.innerHTML = '<div class="loading">Loading…</div>'
    try {
      const res = await apiFetch('/api/bookmark-sort?history=1')
      const data = await res.json()
      const rows = data.history || []
      if (!rows.length) { panel.innerHTML = '<div class="loading">No sort history yet.</div>'; return }
      panel.innerHTML = rows.map((r) => `
        <div class="history-row">
          <div class="history-url">${esc(r.url)}</div>
          <div class="history-meta">
            <span>Sorted into <strong>${esc(r.suggested_collection)}</strong></span>
            <span>${Math.round((r.confidence||0)*100)}% confidence</span>
            <span>via ${esc(r.model_used||'–')}</span>
            <span>${fmtDate(r.created_at)}</span>
          </div>
        </div>`).join('')
    } catch { panel.innerHTML = '<div class="loading">Could not load history.</div>' }
  }

  // ── Add bar ───────────────────────────────
  function setAddStatus(msg, mode='') {
    const el = document.getElementById('addStatus')
    el.className = 'add-bar-status' + (mode ? ' '+mode : '')
    el.innerHTML = (mode==='loading' ? '<span class="spinner"></span>' : '') + esc(msg)
  }

  async function addBookmark() {
    const url = document.getElementById('addUrl').value.trim()
    if (!url) { setAddStatus('Paste a URL first', 'err'); return }
    const collectionSlug = document.getElementById('addCollection').value
    const btn = document.getElementById('addBtn')
    btn.disabled = true
    setAddStatus(collectionSlug ? 'Adding…' : 'AI sorting… ~15s', 'loading')

    try {
      let res, data
      if (collectionSlug) {
        // Direct add to chosen collection (no AI)
        res = await apiFetch('/api/bookmarks', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ url, collection: collectionSlug }),
        })
        data = await res.json()
        if (!res.ok) throw new Error(data.error || 'Could not add bookmark')
        const col = flatCollections.find((c) => c.slug === collectionSlug)
        setAddStatus(`Added to ${col?.name || collectionSlug}`, 'ok')
      } else {
        // AI sort
        res = await apiFetch('/api/bookmark-sort', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ url }),
        })
        data = await res.json()
        if (!res.ok) throw new Error(data.error || 'Could not sort bookmark')
        const col = data.collection?.name || 'Inbox'
        const pct = Math.round((data.confidence||0)*100)
        setAddStatus(`→ ${col} · ${pct}%`, 'ok')
      }
      document.getElementById('addUrl').value = ''
      document.getElementById('addCollection').value = ''
      await Promise.all([loadCollections(), loadBookmarks()])
    } catch (err) {
      setAddStatus(err.message, 'err')
    } finally {
      btn.disabled = false
    }
  }

  // ── Search ────────────────────────────────
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimer)
    searchTimer = setTimeout(loadBookmarks, 280)
  })
  document.getElementById('pinInput').addEventListener('keydown', (e) => { if (e.key==='Enter') unlockApp() })
  document.getElementById('addUrl').addEventListener('keydown', (e) => { if (e.key==='Enter') addBookmark() })
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey||e.ctrlKey) && e.key==='k') {
      e.preventDefault()
      document.getElementById('addUrl').focus()
      document.getElementById('addUrl').select()
    }
  })

  // ── Boot ──────────────────────────────────
  async function bootstrap() {
    await Promise.all([loadCollections(), loadBookmarks()])
  }

  checkAuth().then((ok) => { if (ok) bootstrap() })
</script>
</body>
</html>
