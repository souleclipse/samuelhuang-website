  function openFolderModal(mode, { parentSlug = null, folder = null } = {}) {
    document.getElementById('folderMode').value = mode
    document.getElementById('folderId').value = folder?.id || ''

    const parentField = document.getElementById('folderParentField')
    if (mode === 'create') {
      parentField.style.display = ''
      buildParentSelect(parentSlug || '')
    } else {
      parentField.style.display = 'none'
    }

    document.getElementById('folderModalTitle').textContent = mode === 'edit' ? 'Rename folder' : 'New folder'
    document.getElementById('folderSaveBtn').textContent = mode === 'edit' ? 'Save' : 'Create'
    document.getElementById('folderName').value = folder?.name || ''
    const icon = folder?.icon || '📁'
    buildIconGrid(icon)
    setFolderIcon(icon)
    setFolderStatus('')
    document.getElementById('folderOverlay').classList.add('visible')
    setTimeout(() => document.getElementById('folderName').focus(), 50)
  }

  function closeFolderModal() {
    document.getElementById('folderOverlay').classList.remove('visible')
  }

  async function saveFolderModal() {
    const mode = document.getElementById('folderMode').value
    const name = document.getElementById('folderName').value.trim()
    if (!name) { setFolderStatus('Folder name is required', 'err'); document.getElementById('folderName').focus(); return }
    const custom = document.getElementById('folderIconCustom').value.trim()
    const gridSel = document.querySelector('#iconGrid .icon-opt.selected')?.dataset.icon
    const icon = custom || gridSel || '📁'
    const btn = document.getElementById('folderSaveBtn')
    btn.disabled = true
    setFolderStatus(mode === 'edit' ? 'Saving…' : 'Creating…')

    try {
      if (mode === 'edit') {
        const id = document.getElementById('folderId').value
        const res = await apiFetch('/api/bookmark-collections', {
          method: 'PATCH', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ id, name, icon }),
        })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error || 'Could not save folder')
        closeFolderModal()
        showToast('Folder updated')
        await Promise.all([loadCollections({ background: true }), loadBookmarks({ background: true })])
      } else {
        const parentSlug = document.getElementById('folderParentSelect').value
        const parent = parentSlug ? flatCollections.find((c) => c.slug === parentSlug) : null
        const res = await apiFetch('/api/bookmark-collections', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ name, icon, parent: parent?.id || null }),
        })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error || 'Could not create folder')
        closeFolderModal()
        mergeOptimisticFolder(data.collection)
        showToast('Folder created')
        if (data.collection?.slug) selectFilter('collection', data.collection.slug)
        await Promise.all([loadCollections({ background: true }), loadBookmarks({ background: true })])
        if (data.collection?.id && !flatCollections.some((c) => c.id === data.collection.id)) {
          mergeOptimisticFolder(data.collection)
        }
      }
    } catch (err) {
      setFolderStatus(err.message || 'Something went wrong', 'err')
    } finally {
      btn.disabled = false
    }
  }

  function createFolder(parentSlug = null) {
    openFolderModal('create', { parentSlug })
  }

  function editFolder(folder) {
    if (!folder || folder.id === '__inbox') return
    openFolderModal('edit', { folder })
  }

  async function deleteFolder(folder) {
    if (!folder || folder.id === '__inbox') return
    const msg = `Delete "${folder.name}"? Bookmarks in this folder${folder.children?.length ? ' and its subfolders' : ''} will move to Inbox.`
    if (!confirm(msg)) return
    try {
      const res = await apiFetch('/api/bookmark-collections', {
        method: 'DELETE',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ id: folder.id }),
      })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || 'Could not delete folder')
      if (currentFilter === 'collection' && (currentSlug === folder.slug || (folder.children || []).some((ch) => ch.slug === currentSlug))) {
        currentFilter = 'all'
        currentSlug = null
        setSidebarActive('all')
      }
      await Promise.all([loadCollections({ background: true }), loadBookmarks({ background: true })])
      showToast('Folder deleted')
    } catch (err) {
      showToast(err.message || 'Could not delete folder', 'err')
    }
  }

  function folderRecentBookmarks(c) {
    return allBookmarks
      .filter((b) => {
        if (c.slug === '__inbox') return !b.collection
        if (b.collection?.slug === c.slug) return true
        return (c.children || []).some((ch) => ch.slug === b.collection?.slug)
      })
      .sort((a,b) => new Date(b.created_at) - new Date(a.created_at))
  }

  function showRecentBookmarks() {
    currentFilter = 'all'
    currentSlug = null
    setSidebarActive('all')
    document.getElementById('searchInput').value = ''
    const items = [...allBookmarks].sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 25)
    document.getElementById('subColGrid').style.display = 'none'
    document.getElementById('mainTitle').textContent = 'Recently added'
    renderBookmarks(items)
  }

  // ── AI search (OpenRouter owl-alpha) ──────────
  function clearAiAnswer() {
    const el = document.getElementById('aiAnswer')
    el.style.display = 'none'
    el.innerHTML = ''
  }

  function aiAnswerHead() {
    return `<div class="ai-answer-head">✨ AI search<button class="dismiss" title="Close AI search" onclick="exitAiSearch()">✕</button></div>`
  }

  function exitAiSearch() {
    aiResults = null
    clearAiAnswer()
    document.getElementById('searchInput').value = ''
    toggleSearchClear()
    selectFilter('all')
  }

  async function runAiSearch() {
    if (aiSearching) return
    const q = document.getElementById('searchInput').value.trim()
    if (!q) { document.getElementById('searchInput').focus(); showToast('Type what you are looking for, then Ask AI', 'warn'); return }

    aiSearching = true
    currentFilter = 'ai'; currentSlug = null; currentTag = ''
    setSidebarActive('ai')
    const btn = document.getElementById('aiSearchBtn')
    btn.disabled = true; btn.textContent = '✨ Thinking…'

    document.getElementById('historyPanel').style.display = 'none'
    document.getElementById('subColGrid').style.display = 'none'
    document.getElementById('subPanel').classList.remove('visible')
    setView(currentView)
    document.getElementById('mainTitle').textContent = '✨ AI search'
    document.getElementById('resultCount').textContent = ''
    document.getElementById('emptyState').classList.remove('visible')
    const target = currentView === 'grid' ? 'gridContainer' : 'listContainer'
    document.getElementById(target).innerHTML = '<div class="loading">Asking owl-alpha…</div>'

    const ai = document.getElementById('aiAnswer')
    ai.style.display = 'block'
    ai.innerHTML = `${aiAnswerHead()}<p>Searching “${esc(q)}” across ${allBookmarks.length} bookmarks…</p>`

    try {
      const res = await apiFetch('/api/bookmarks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ aiSearch: true, query: q }),
      })
      if (res.status === 401) { showAuth('Enter your dashboard password.'); return }
      const data = await safeJson(res)
      if (!res.ok) throw new Error(data.error || 'AI search failed')
      aiResults = data.bookmarks || []
      const answer = data.answer || 'Here are the closest matches.'
      ai.innerHTML = `${aiAnswerHead()}<p>${esc(answer)}</p>`
        + `<div class="ai-meta">${aiResults.length} match${aiResults.length === 1 ? '' : 'es'} · ${esc(data.model_used || 'owl-alpha')} · query: “${esc(q)}”</div>`
      if (currentFilter !== 'ai') return // user navigated away mid-request
      renderBookmarks(aiResults)
    } catch (err) {
      ai.innerHTML = `${aiAnswerHead()}<p>${esc(err.message || 'AI search failed')}</p>`
      document.getElementById('listContainer').innerHTML = ''
      document.getElementById('gridContainer').innerHTML = ''
      showToast(err.message || 'AI search failed', 'err')
    } finally {
      aiSearching = false
      btn.disabled = false; btn.textContent = '✨ Ask AI'
    }
  }

  // ── Recently deleted (trash) ──────────────────
  function trashDaysLeft(deletedAt) {
    const elapsedDays = (Date.now() - new Date(deletedAt).getTime()) / 86400000
    return Math.max(0, Math.ceil(trashRetentionDays - elapsedDays))
  }

  async function loadTrash() {
    const listEl = document.getElementById('listContainer')
    document.getElementById('gridContainer').style.display = 'none'
    listEl.style.display = ''
    listEl.innerHTML = '<div class="loading">Loading…</div>'
    document.getElementById('emptyState').classList.remove('visible')
    try {
      const res = await apiFetch('/api/bookmarks?trash=1')
      if (res.status === 401) { showAuth('Enter your dashboard password.'); return }
      if (!res.ok) throw new Error('Could not load Recently deleted')
      const data = await res.json()
      const items = data.bookmarks || []
      if (data.retention_days) trashRetentionDays = data.retention_days
      document.getElementById('countTrash').textContent = items.length
      if (currentFilter === 'trash') renderTrash(items)
    } catch (err) {
      showToast(err.message || 'Could not load Recently deleted', 'err')
      listEl.innerHTML = ''
    }
  }

  function renderTrash(items) {
    const listEl = document.getElementById('listContainer')
    document.getElementById('gridContainer').innerHTML = ''
    destroySortables()
    document.getElementById('resultCount').textContent = items.length ? `${items.length} in trash` : ''
    if (!items.length) {
      listEl.innerHTML = `<div class="trash-info">Nothing here. Deleted bookmarks land in Recently deleted and are permanently removed after ${trashRetentionDays} days.</div>`
      return
    }
    const banner = `<div class="trash-info">Items are permanently deleted ${trashRetentionDays} days after removal. Restore anything you still need.</div>`
    listEl.innerHTML = banner + items.map(trashRowHtml).join('')
    listEl.querySelectorAll('[data-trash-action]').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation()
        const row = btn.closest('[data-id]')
        const id = row.dataset.id
        if (btn.dataset.trashAction === 'restore') restoreBookmark(id, true)
        if (btn.dataset.trashAction === 'purge') purgeBookmark(id, row)
      })
    })
  }

  function trashRowHtml(b) {
    const left = trashDaysLeft(b.deleted_at)
    return `
      <div class="list-row trash-row" data-id="${b.id}" data-url="${esc(b.url)}">
        <img class="list-favicon" src="${esc(favicon(b))}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
        <div class="list-info">
          <div class="list-title">${esc(b.title||b.url)}</div>
          <div class="list-meta">
            <span class="list-domain">${esc(domain(b.url))}</span>
            <span class="trash-when">deleted ${esc(fmtDate(b.deleted_at))} · ${left} day${left===1?'':'s'} left</span>
          </div>
        </div>
        <div class="list-actions">
          <button class="icon-btn" data-trash-action="restore" title="Restore to your bookmarks">↩ Restore</button>
          <button class="icon-btn danger" data-trash-action="purge" title="Permanently delete">Delete forever</button>
        </div>
      </div>`
  }

  async function restoreBookmark(id, fromTrash=false) {
    try {
      const res = await apiFetch('/api/bookmarks', {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ id, restore: true }),
      })
      if (!res.ok) throw new Error('Could not restore')
      showToast('Restored')
      await loadCollections({ background: true })
      if (fromTrash && currentFilter === 'trash') loadTrash()
      else loadBookmarks({ background: true })
    } catch (err) {
      showToast(err.message || 'Could not restore', 'err')
    }
  }

  async function purgeBookmark(id, row) {
    if (!confirm('Permanently delete this bookmark? This cannot be undone.')) return
    try {
      const res = await apiFetch('/api/bookmarks', {
        method: 'DELETE', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ id, purge: true }),
      })
      if (!res.ok) throw new Error('Could not delete')
      if (row) row.remove()
      const countEl = document.getElementById('countTrash')
      countEl.textContent = Math.max(0, (parseInt(countEl.textContent, 10) || 1) - 1)
      showToast('Permanently deleted')
    } catch (err) {
      showToast(err.message || 'Could not delete', 'err')
    }
  }

  function setTitle() {
    if (currentFilter === 'favorites') { document.getElementById('mainTitle').textContent = 'Favorites'; return }
    if (currentFilter === 'recent') { document.getElementById('mainTitle').textContent = '🕘 Recently added'; return }
    if (currentFilter === 'ai') { document.getElementById('mainTitle').textContent = '✨ AI search'; return }
    if (currentFilter === 'collection') {
      const c = flatCollections.find((x) => x.slug === currentSlug) || collections.find((x) => x.slug === currentSlug)
      document.getElementById('mainTitle').textContent = c ? `${c.icon||''} ${c.name}`.trim() : 'Collection'
      return
    }
    document.getElementById('mainTitle').textContent = 'All bookmarks'
  }

  // ── Bulk "enhance blank descriptions" ─────────
  function isBlankDesc(b) {
    const d = (b.description || '').trim()
    return !d || /^unable to crawl/i.test(d)
  }

  function updateBlanksButton() {
    const btn = document.getElementById('enhanceBlanksBtn')
    if (!btn || btn.disabled) return
    const n = (allBookmarks || []).filter(isBlankDesc).length
    const show = n > 0 && currentFilter !== 'trash'
    btn.style.display = show ? '' : 'none'
    btn.textContent = `✨ Enhance ${n} blank${n === 1 ? '' : 's'}`
  }

  async function runEnhanceBlanks() {
    const btn = document.getElementById('enhanceBlanksBtn')
    btn.disabled = true
    btn.textContent = 'Finding blanks…'
    let all = []
    try {
      const r = await apiFetch('/api/bookmarks')
      if (r.status === 401) { showAuth('Enter your dashboard password.'); btn.disabled = false; return }
      const d = await r.json()
      all = d.bookmarks || []
    } catch { /* ignore */ }
    const blanks = all.filter(isBlankDesc)
    if (!blanks.length) {
      showToast('No blank descriptions to fix')
      btn.disabled = false; updateBlanksButton(); return
    }
    let done = 0, failed = 0
    for (const b of blanks) {
      btn.textContent = `Enhancing ${done + failed + 1}/${blanks.length}…`
      try {
        const r = await apiFetch('/api/bookmark-sort', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ refresh: true, save: true, id: b.id, url: b.url, context: b.notes || '' }),
        })
        if (!r.ok) throw new Error('failed')
        done++
      } catch { failed++ }
    }
    showToast(`Enhanced ${done} description${done === 1 ? '' : 's'}${failed ? `, ${failed} failed` : ''}`)
    btn.disabled = false
    await Promise.all([loadCollections({ background: true }), loadBookmarks({ background: true })])
    updateBlanksButton()
  }

  function renderBookmarks(items) {
    lastRenderedBookmarks = items
    setTitle()
    updateBlanksButton()
    document.getElementById('resultCount').textContent = items.length ? `${items.length} bookmarks` : ''
    const gridEl = document.getElementById('gridContainer')
    const listEl = document.getElementById('listContainer')
    const emptyEl = document.getElementById('emptyState')

    // Reflect selection state on containers
    const hasSelection = selectedIds.size > 0
    document.querySelectorAll('.grid-view,.list-view').forEach((el) =>
      el.classList.toggle('has-selection', hasSelection))

    if (!items.length) {
      gridEl.innerHTML = ''; listEl.innerHTML = ''
      emptyEl.classList.add('visible')
      destroySortables(); return
    }
    emptyEl.classList.remove('visible')

    if (currentView === 'grid') {
      gridEl.innerHTML = items.map(cardHtml).join('')
      listEl.innerHTML = ''
      wireActions(gridEl)
      initSortable(gridEl, 'grid')
    } else {
      listEl.innerHTML = items.map(rowHtml).join('')
      gridEl.innerHTML = ''
      wireActions(listEl)
      initSortable(listEl, 'list')
    }
  }

  function destroySortables() {
    if (sortableGrid) { sortableGrid.destroy(); sortableGrid = null }
    if (sortableList) { sortableList.destroy(); sortableList = null }
  }

  function initSortable(container, type) {
    destroySortables()
    if (typeof Sortable === 'undefined') return
    const s = Sortable.create(container, {
      handle: '.drag-handle',
      animation: 150,
      ghostClass: 'sortable-ghost',
      dragClass: 'sortable-drag',
      onStart(evt) {
        draggedBookmarkId = evt.item?.dataset?.id || null
      },
      onEnd() {
        draggedBookmarkId = null
        // Switch to manual sort mode
        const sel = document.getElementById('sortSelect')
        if (sel) sel.value = 'manual'
        // Collect new order of IDs from DOM
        const ids = [...container.querySelectorAll('[data-id]')].map((el) => el.dataset.id)
        // Update local sort_order
        ids.forEach((id, i) => {
          const bm = allBookmarks.find((b) => b.id === id)
          if (bm) bm.sort_order = (i + 1) * 10
        })
        // Persist to DB
        apiFetch('/api/bookmarks', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reorder: ids }),
        }).catch(() => showToast('Could not save order', 'err'))
      },
    })
    if (type === 'grid') sortableGrid = s
    else sortableList = s
  }

  // ── Card HTML ─────────────────────────────
  function cardHtml(b) {
    const tags = bookmarkTagsHtml(b, 4)
    const sel = selectedIds.has(b.id)
    return `
      <div class="bm-card${sel?' selected':''}" data-id="${b.id}" data-url="${esc(b.url)}" draggable="true">
        <div class="bm-card-head">
          <span class="drag-handle" title="Drag to reorder">⠿</span>
          <input type="checkbox" class="bm-check" data-action="check" ${sel?'checked':''} title="Select">
          <img class="bm-favicon" src="${esc(favicon(b))}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
          <div style="min-width:0;flex:1">
            <div class="bm-title">${esc(b.title||b.url)}</div>
            <div class="bm-domain">${esc(domain(b.url))}</div>
          </div>
        </div>
        ${b.description && b.description!=='Unable to crawl' ? `<div class="bm-desc">${esc(b.description)}</div>` : ''}
        <div class="bm-footer">
          <div class="bm-tags">${tags}</div>
          <div class="bm-actions">
            <button class="icon-btn edit" title="Edit bookmark" data-action="edit">Edit</button>
            <button class="icon-btn danger" title="Delete" data-action="del">✕</button>
            <button class="icon-btn fav ${b.is_favorite?'starred':''}" title="Favorite" data-action="fav">${b.is_favorite?'★':'☆'}</button>
          </div>
        </div>
      </div>`
  }

  // ── List row HTML ─────────────────────────
  function rowHtml(b) {
    const tags = bookmarkTagsHtml(b, 3)
    const desc = b.description && b.description !== 'Unable to crawl' ? b.description : ''
    const sel = selectedIds.has(b.id)
    return `
      <div class="list-row${sel?' selected':''}" data-id="${b.id}" data-url="${esc(b.url)}" draggable="true">
        <span class="row-gutter">
          <span class="drag-handle" title="Drag to reorder">⠿</span>
          <input type="checkbox" class="bm-check" data-action="check" ${sel?'checked':''} title="Select">
        </span>
        <img class="list-favicon" src="${esc(favicon(b))}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
        <div class="list-info">
          <div class="list-title">${esc(b.title||b.url)}</div>
          ${desc ? `<div class="list-desc">${esc(desc)}</div>` : ''}
          <div class="list-meta">
            <span class="list-domain">${esc(domain(b.url))}</span>
            ${tags ? `<div class="list-tags">${tags}</div>` : ''}
          </div>
        </div>
        <select class="row-move-select" data-action="move" title="Folder — click to move">
          ${collectionOptions(b.collection_id)}
        </select>
        <div class="list-actions">
          <button class="icon-btn edit" title="Edit bookmark" data-action="edit">Edit</button>
          <button class="icon-btn danger" title="Delete" data-action="del">✕</button>
          <button class="icon-btn fav ${b.is_favorite?'starred':''}" title="Favorite" data-action="fav">${b.is_favorite?'★':'☆'}</button>
        </div>
      </div>`
  }

  function bookmarkTagsHtml(b, limit) {
    const tags = []
    if (b.collection && currentFilter === 'all') {
      // Show the full path (Parent › Subfolder) so you can tell nesting at a glance.
      const col = flatCollections.find((c) => c.slug === b.collection.slug)
      const parent = col?.parent_id ? flatCollections.find((p) => p.id === col.parent_id) : null
      const childName = col?.name || b.collection.name
      const childIcon = col?.icon || b.collection.icon || ''
      let inner, full
      if (parent) {
        full = `${parent.name} › ${childName}`
        inner = `${parent.icon ? esc(parent.icon) + ' ' : ''}<span class="fp-parent">${esc(parent.name)}</span><span class="fp-sep">›</span>${esc(childName)}`
      } else {
        full = childName
        inner = `${childIcon ? esc(childIcon) + ' ' : ''}${esc(childName)}`
      }
      tags.push(`<span class="bm-tag folder-tag" title="${esc(full)}">${inner}</span>`)
    }
    tags.push(...(b.tags||[]).slice(0, limit).map((t) => `<span class="bm-tag">${esc(t)}</span>`))
    return tags.slice(0, limit + 1).join('')
  }

  function collectionOptions(selectedId) {
    return flatCollections.map((c) =>
      `<option value="${esc(c.slug)}" ${(c.id===selectedId || (!selectedId && c.slug === '__inbox'))?'selected':''}>${esc(collectionLabel(c))}</option>`
    ).join('')
  }

  function collectionLabel(c) {
    const parent = c.parent_id ? flatCollections.find((p) => p.id === c.parent_id) : null
    return (parent ? `${parent.icon||''} ${parent.name} › ${c.name}` : `${c.icon||''} ${c.name}`).trim()
  }

  function populateMoveSelect() {
    const sel = document.getElementById('multiMoveSelect')
    if (!sel) return
    sel.innerHTML = '<option value="">Move to…</option>' + flatCollections
      .map((c) => `<option value="${esc(c.slug)}">${esc(collectionLabel(c))}</option>`)
      .join('')
  }

  function wireActions(container) {
    // Whole card/row click → open URL (stop on buttons/inputs)
    container.querySelectorAll('[data-id]').forEach((card) => {
      card.addEventListener('dragstart', () => { draggedBookmarkId = card.dataset.id })
      card.addEventListener('dragend', () => { draggedBookmarkId = null })
      card.addEventListener('click', (e) => {
        if (e.target.closest('button,input,select,a,.drag-handle')) return
        const url = card.dataset.url
        if (url) window.open(url, '_blank', 'noopener,noreferrer')
      })
    })

    container.querySelectorAll('[data-action="check"]').forEach((chk) => {
      chk.addEventListener('change', (e) => {
        e.stopPropagation()
        const card = chk.closest('[data-id]')
        const id = card.dataset.id
        if (chk.checked) selectedIds.add(id)
        else selectedIds.delete(id)
        card.classList.toggle('selected', chk.checked)
        updateMultiBar()
        // Toggle has-selection class on container
        container.classList.toggle('has-selection', selectedIds.size > 0)
      })
    })

    container.querySelectorAll('[data-action="fav"]').forEach((btn) => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation()
        const card = btn.closest('[data-id]')
        const bm = allBookmarks.find((b) => b.id === card.dataset.id)
        if (!bm) return
        const next = !bm.is_favorite
        await patchBookmark(bm.id, { is_favorite: next })
        bm.is_favorite = next
        btn.textContent = next ? '★' : '☆'
        btn.classList.toggle('starred', next)
      })
    })

    container.querySelectorAll('[data-action="edit"]').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation()
        const card = btn.closest('[data-id]')
        const bm = allBookmarks.find((b) => b.id === card.dataset.id)
        if (bm) openEditModal(bm)
      })
    })

    container.querySelectorAll('[data-action="move"]').forEach((sel) => {
      sel.addEventListener('click', (e) => e.stopPropagation())
      sel.addEventListener('change', async (e) => {
        e.stopPropagation()
        const card = sel.closest('[data-id]')
        await moveBookmarksToCollection([card.dataset.id], sel.value)
      })
    })

    container.querySelectorAll('[data-action="del"]').forEach((btn) => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation()
        const card = btn.closest('[data-id]')
        const id = card.dataset.id
        try {
          const res = await apiFetch('/api/bookmarks', {
            method: 'DELETE', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ id }),
          })
          if (!res.ok) throw new Error('Could not delete')
        } catch (err) {
          showToast(err.message || 'Could not delete', 'err')
          return
        }
        card.remove()
        selectedIds.delete(id)
        allBookmarks = allBookmarks.filter((b) => b.id !== id)
        loadCollections({ background: true })
        updateMultiBar()
        document.getElementById('resultCount').textContent = allBookmarks.length ? `${allBookmarks.length} bookmarks` : ''
        if (!allBookmarks.length) document.getElementById('emptyState').classList.add('visible')
        showUndoToast('Moved to Recently deleted', () => restoreBookmark(id))
      })
    })
  }

  // ── Multi-select ──────────────────────────
  function updateMultiBar() {
    const bar = document.getElementById('multiBar')
    const n = selectedIds.size
    document.getElementById('multiCount').textContent = `${n} selected`
    bar.classList.toggle('show', n > 0)
  }

  function openSelected() {
    for (const id of selectedIds) {
      const bm = allBookmarks.find((b) => b.id === id)
      if (bm?.url) window.open(bm.url, '_blank', 'noopener,noreferrer')
    }
    clearSelection()
  }

  function clearSelection() {
    selectedIds.clear()
    document.querySelectorAll('.bm-check').forEach((c) => { c.checked = false })
    document.querySelectorAll('[data-id]').forEach((el) => el.classList.remove('selected'))
    document.querySelectorAll('.grid-view,.list-view').forEach((el) => el.classList.remove('has-selection'))
    updateMultiBar()
  }

  async function patchBookmark(id, fields) {
    const res = await apiFetch('/api/bookmarks', {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id, ...fields }),
    })
    if (res.status === 401) { showAuth('Session expired.') }
    return res.json()
  }

  function setEditStatus(msg, mode='') {
    const el = document.getElementById('editStatus')
    el.textContent = msg || ''
    el.className = 'modal-status' + (mode ? ' ' + mode : '')
  }

  function parseTagsInput(value) {
    return String(value || '')
      .split(',')
      .map((t) => t.trim())
      .filter(Boolean)
      .slice(0, 8)
  }

  function openEditModal(bm) {
    document.getElementById('editId').value = bm.id
    document.getElementById('editUrl').value = bm.url || ''
    document.getElementById('editTitle').value = bm.title || ''
    document.getElementById('editDescription').value = bm.description && bm.description !== 'Unable to crawl' ? bm.description : ''
    document.getElementById('editNotes').value = bm.notes || ''
    document.getElementById('editTags').value = (bm.tags || []).join(', ')
    const sel = document.getElementById('editCollection')
    sel.innerHTML = collectionOptions(bm.collection_id)
    setEditStatus('')
    document.getElementById('editOverlay').classList.add('visible')
    setTimeout(() => document.getElementById('editTitle').focus(), 50)
  }

  function closeEditModal() {
    document.getElementById('editOverlay').classList.remove('visible')
  }

  // Keep the open edit modal's folder dropdown in sync when folders change
  // (e.g. a new folder was just created), preserving the current selection.
  function refreshEditFolderSelect() {
    const overlay = document.getElementById('editOverlay')
    if (!overlay.classList.contains('visible')) return
    const sel = document.getElementById('editCollection')
    const prev = sel.value
    const bm = allBookmarks.find((b) => b.id === document.getElementById('editId').value)
    sel.innerHTML = collectionOptions(bm ? bm.collection_id : null)
    if (prev) sel.value = prev
  }

  function readEditForm() {
    return {
      id: document.getElementById('editId').value,
      url: document.getElementById('editUrl').value.trim(),
      title: document.getElementById('editTitle').value.trim(),
      description: document.getElementById('editDescription').value.trim(),
      notes: document.getElementById('editNotes').value.trim(),
      tags: parseTagsInput(document.getElementById('editTags').value),
      collection: document.getElementById('editCollection').value,
    }
  }

  async function reresearchEdit() {
    const url = document.getElementById('editUrl').value.trim()
    if (!url) { setEditStatus('URL is required', 'err'); return }
    const btn = document.getElementById('reresearchBtn')
    btn.disabled = true
    setEditStatus('Re-researching from the live page… ~15s', '')
    try {
      const currentNotes = document.getElementById('editNotes').value.trim()
      const res = await apiFetch('/api/bookmark-sort', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ url, refresh: true, context: currentNotes }),
      })
      const data = await safeJson(res)
      if (!res.ok) throw new Error(data.error || 'Could not re-research bookmark')
      if (data.title) document.getElementById('editTitle').value = data.title
      if (data.description) document.getElementById('editDescription').value = data.description
      if (data.notes) document.getElementById('editNotes').value = data.notes
      if (Array.isArray(data.tags) && data.tags.length) document.getElementById('editTags').value = data.tags.join(', ')
      const sug = data.suggested_collection?.name ? ` · suggested folder: ${data.suggested_collection.name}` : ''
      setEditStatus(`Rewritten via ${data.model_used}${sug} — review and Save`, 'ok')
    } catch (err) {
      setEditStatus(err.message || 'Could not re-research bookmark', 'err')
    } finally {
      btn.disabled = false
    }
  }

  async function proofreadEdit() {
    const form = readEditForm()
    const btn = document.getElementById('proofreadBtn')
    btn.disabled = true
    setEditStatus('Proofreading...', '')
    try {
      const res = await apiFetch('/api/bookmarks', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ proofread: true, ...form }),
      })
      const data = await safeJson(res)
      if (!res.ok) throw new Error(data.error || 'Could not proofread bookmark')
      document.getElementById('editTitle').value = data.proofread.title || form.title
      document.getElementById('editDescription').value = data.proofread.description || form.description
      document.getElementById('editNotes').value = data.proofread.notes || form.notes
      document.getElementById('editTags').value = (data.proofread.tags || form.tags).join(', ')
      setEditStatus(`Proofread via ${data.proofread.model_used}`, 'ok')
    } catch (err) {
      setEditStatus(err.message || 'Could not proofread bookmark', 'err')
    } finally {
      btn.disabled = false
    }
  }

  async function saveEditBookmark() {
    const form = readEditForm()
    if (!form.id) return
    if (!form.url) { setEditStatus('URL is required', 'err'); return }
    const btn = document.getElementById('saveEditBtn')
    btn.disabled = true
    setEditStatus('Saving...', '')
    try {
      const res = await apiFetch('/api/bookmarks', {
        method: 'PATCH',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(form),
      })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || 'Could not save bookmark')
      mergeBookmark(data.bookmark)
      await loadCollections({ background: true })
      applyFilters()
      closeEditModal()
      showToast('Bookmark updated')
    } catch (err) {
      setEditStatus(err.message || 'Could not save bookmark', 'err')
    } finally {
      btn.disabled = false
    }
  }

  async function moveBookmarksToCollection(ids, collectionSlug) {
    if (!collectionSlug || !ids.length) return
    const moved = []
    for (const id of ids) {
      const res = await patchBookmark(id, { collection: collectionSlug })
      if (res?.bookmark) moved.push(res.bookmark)
    }
    if (!moved.length) return
    const byId = new Map(moved.map((b) => [b.id, b]))
    allBookmarks = allBookmarks
      .map((b) => byId.get(b.id) || b)
      .filter((b) => currentFilter !== 'collection' || collectionSlug === currentSlug || !byId.has(b.id))
    clearSelection()
    cacheCurrentBookmarks()
    await loadCollections({ background: true })
    applyFilters()
    showToast(`Moved ${moved.length} bookmark${moved.length === 1 ? '' : 's'}`)
  }

  async function moveSelectedToCollection(collectionSlug) {
    const sel = document.getElementById('multiMoveSelect')
    if (sel) sel.value = ''
    await moveBookmarksToCollection([...selectedIds], collectionSlug)
  }

  // ── Collections ───────────────────────────
  async function loadCollections({ background=false } = {}) {
    try {
      const res = await apiFetch('/api/bookmark-collections')
      if (res.status === 401) { showAuth(); return }
      if (!res.ok) throw new Error('Could not load collections')
      const data = await res.json()
      collections = data.collections || []
      flatCollections = data.flat || []
      writeCache(CACHE_KEYS.collections, { collections, flat: flatCollections })
      renderSidebar()
      populateAddBarSelect()
      populateMoveSelect()
      refreshEditFolderSelect()
      document.getElementById('countFav').textContent = allBookmarks.filter((b) => b.is_favorite).length || 0
      document.getElementById('countRecent').textContent = Math.min(10, allBookmarks.length)
    } catch (err) {
      if (!background) {
        showToast(err.message || 'Could not load collections', 'err')
        document.getElementById('collectionNav').innerHTML = `<div class="error-panel"><strong>${esc(err.message || 'Could not load folders')}</strong><button type="button" onclick="loadCollections()">Retry</button></div>`
        showDataError(err.message || 'Could not load folders', () => loadCollections())
      } else {
        setSyncStatus('Sync failed', 'warn')
      }
    }
  }

  function populateAddBarSelect() {
    const sel = document.getElementById('addCollection')
    const prev = sel.value
    sel.innerHTML = '<option value="">AI sort (auto folder)</option>'
    for (const c of flatCollections) {
      const parent = c.parent_id ? flatCollections.find((p) => p.id === c.parent_id) : null
      const label = parent ? `${parent.icon||''} ${parent.name} › ${c.name}` : `${c.icon||''} ${c.name}`
      const opt = document.createElement('option')
      opt.value = c.slug
      opt.textContent = label.trim()
      sel.appendChild(opt)
    }
    if (prev) sel.value = prev
  }

  // ── Sub-collection grid ───────────────────
  function renderSubColGrid() {
    const el = document.getElementById('subColGrid')
    if (currentFilter === 'all') {
      el.style.display = ''
      el.innerHTML = `<div class="subcol-grid">${collections.map(folderCardHtml).join('')}</div>`
      return
    }
    if (currentFilter !== 'collection' || !currentSlug) { el.style.display = 'none'; return }
    const parent = collections.find((c) => c.slug === currentSlug)
    if (!parent || !parent.children || !parent.children.length) { el.style.display = 'none'; return }
    el.style.display = ''
    el.innerHTML = `<div class="subcol-grid">${parent.children.map(folderCardHtml).join('')}</div>`
  }

  // ── History ───────────────────────────────
  async function loadHistory() {
    const panel = document.getElementById('historyPanel')
    panel.innerHTML = '<div class="loading">Loading…</div>'
    try {
      const res = await apiFetch('/api/bookmark-sort?history=1')
      const data = await res.json()
      const rows = data.history || []
      if (!rows.length) { panel.innerHTML = '<div class="loading">No sort history yet.</div>'; return }
      panel.innerHTML = rows.map((r) => `
        <div class="history-row">
          <div class="history-url">${esc(r.url)}</div>
          <div class="history-meta">
            <span>Sorted into <strong>${esc(r.suggested_collection)}</strong></span>
            <span>${Math.round((r.confidence||0)*100)}% confidence</span>
            <span>via ${esc(r.model_used||'–')}</span>
            <span>${fmtDate(r.created_at)}</span>
          </div>
        </div>`).join('')
    } catch { panel.innerHTML = '<div class="loading">Could not load history.</div>' }
  }

  // ── Add bar ───────────────────────────────
  function setAddStatus(msg, mode='') {
    const el = document.getElementById('addStatus')
    el.className = 'add-bar-status' + (mode ? ' '+mode : '')
    el.innerHTML = (mode==='loading' ? '<span class="spinner"></span>' : '') + esc(msg)
  }

  async function addBookmark() {
    const url = document.getElementById('addUrl').value.trim()
    if (!url) { setAddStatus('Paste a URL first', 'err'); return }
    const context = document.getElementById('addContext').value.trim()
    const collectionSlug = document.getElementById('addCollection').value
    const btn = document.getElementById('addBtn')
    btn.disabled = true
    const chosen = collectionSlug ? (flatCollections.find((c) => c.slug === collectionSlug)?.name || 'folder') : ''
    setAddStatus(chosen ? `Researching + filing in ${chosen}… ~15s` : 'AI sorting + writing description… ~15s', 'loading')

    try {
      // Every add runs the AI research (title/description/notes/tags). If a folder is
      // chosen it's honoured; otherwise the AI also picks the folder.
      const res = await apiFetch('/api/bookmark-sort', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ url, context, collection: collectionSlug || undefined }),
      })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || 'Could not add bookmark')
      mergeBookmark(data.bookmark)
      const col = data.collection?.name || 'Inbox'
      if (data.duplicate) {
        setAddStatus(`Already saved in ${col}`, 'ok')
      } else if (collectionSlug) {
        setAddStatus(`Added to ${col} · AI wrote the details`, 'ok')
      } else {
        const pct = Math.round((data.confidence||0)*100)
        setAddStatus(`Added to ${col} · AI ${pct}% sure of folder`, 'ok')
      }
      document.getElementById('addUrl').value = ''
      document.getElementById('addContext').value = ''
      document.getElementById('addCollection').value = ''
      await loadCollections({ background: true })
      applyFilters()
    } catch (err) {
      setAddStatus(err.message, 'err')
    } finally {
      btn.disabled = false
    }
  }

  // ── Search ────────────────────────────────
  function toggleSearchClear() {
    document.getElementById('searchClear').classList.toggle('visible', !!document.getElementById('searchInput').value)
  }

  function clearSearch() {
    const input = document.getElementById('searchInput')
    input.value = ''
    toggleSearchClear()
    if (currentFilter === 'ai' || currentFilter === 'trash') {
      currentFilter = 'all'; aiResults = null; clearAiAnswer(); setSidebarActive('all')
      document.getElementById('listContainer').style.display = currentView === 'list' ? '' : 'none'
      document.getElementById('gridContainer').style.display = currentView === 'grid' ? '' : 'none'
    }
    applyFilters()
    loadBookmarks({ background: true })
    input.focus()
  }

  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimer)
    toggleSearchClear()
    if (currentFilter === 'ai' || currentFilter === 'trash') {
      currentFilter = 'all'; aiResults = null; clearAiAnswer(); setSidebarActive('all')
      document.getElementById('listContainer').style.display = currentView === 'list' ? '' : 'none'
      document.getElementById('gridContainer').style.display = currentView === 'grid' ? '' : 'none'
    }
    applyFilters()
    searchTimer = setTimeout(() => {
      if (!document.getElementById('searchInput').value.trim()) loadBookmarks({ background: true })
    }, 280)
  })
  document.getElementById('pinInput').addEventListener('keydown', (e) => { if (e.key==='Enter') unlockApp() })
  document.getElementById('addUrl').addEventListener('keydown', (e) => { if (e.key==='Enter') addBookmark() })
  document.getElementById('addContext').addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') addBookmark()
  })
  // Folder modal: live custom-emoji preview + Enter to save.
  document.getElementById('folderName').addEventListener('keydown', (e) => { if (e.key === 'Enter') saveFolderModal() })
  document.getElementById('folderIconCustom').addEventListener('keydown', (e) => { if (e.key === 'Enter') saveFolderModal() })
  document.getElementById('folderIconCustom').addEventListener('input', (e) => {
    const v = e.target.value.trim()
    document.getElementById('folderIconPreview').textContent = v || document.querySelector('#iconGrid .icon-opt.selected')?.dataset.icon || '📁'
    if (v) document.querySelectorAll('#iconGrid .icon-opt').forEach((b) => b.classList.remove('selected'))
  })
  document.addEventListener('keydown', (e) => {
    const active = document.activeElement
    const isTyping = active && ['INPUT','TEXTAREA','SELECT'].includes(active.tagName)
    if (e.key === 'Escape' && document.getElementById('folderOverlay').classList.contains('visible')) {
      closeFolderModal(); return
    }
    if (e.key === '/' && !isTyping) {
      e.preventDefault()
      document.getElementById('searchInput').focus()
      return
    }
    if (e.key === 'Escape' && document.getElementById('searchInput').value) {
      if (document.getElementById('editOverlay').classList.contains('visible')) {
        closeEditModal()
        return
      }
      document.getElementById('searchInput').value = ''
      toggleSearchClear()
      if (currentFilter === 'ai') { currentFilter = 'all'; aiResults = null; clearAiAnswer(); setSidebarActive('all') }
      applyFilters()
      return
    }
    if (e.key === 'Escape' && document.getElementById('editOverlay').classList.contains('visible')) {
      closeEditModal()
      return
    }
    if (e.key === 'Enter' && active?.id === 'searchInput') {
      if (e.metaKey || e.ctrlKey) { e.preventDefault(); runAiSearch(); return }
      const top = lastRenderedBookmarks[0]
      if (top?.url) window.open(top.url, '_blank', 'noopener,noreferrer')
      return
    }
    if ((e.metaKey||e.ctrlKey) && e.key==='k') {
      e.preventDefault()
      document.getElementById('addUrl').focus()
      document.getElementById('addUrl').select()
    }
  })

  // ── Boot ──────────────────────────────────
  async function bootstrap() {
    const hasCachedView = hydrateFromCache()
    await Promise.all([
      loadCollections({ background: hasCachedView }),
      loadBookmarks({ background: hasCachedView }),
    ])
  }

  // ── Resizable sidebar ─────────────────────
  const SIDEBAR_W_KEY = 'samuel_bookmark_sidebar_w'
  const SIDEBAR_MIN = 180
  const SIDEBAR_MAX = 460

  function applySidebarWidth(px) {
    const w = Math.max(SIDEBAR_MIN, Math.min(SIDEBAR_MAX, px))
    document.documentElement.style.setProperty('--sidebar-w', w + 'px')
    return w
  }

  function restoreSidebarWidth() {
    const saved = parseInt(localStorage.getItem(SIDEBAR_W_KEY) || '', 10)
    if (Number.isFinite(saved)) applySidebarWidth(saved)
  }

  function initSidebarResizer() {
    const resizer = document.getElementById('sidebarResizer')
    const shell = document.getElementById('appShell')
    if (!resizer || !shell) return
    let dragging = false

    const onMove = (e) => {
      if (!dragging) return
      const left = shell.getBoundingClientRect().left
      const x = (e.touches ? e.touches[0].clientX : e.clientX)
      applySidebarWidth(x - left)
    }
    const onUp = () => {
      if (!dragging) return
      dragging = false
      resizer.classList.remove('dragging')
      document.body.classList.remove('col-resizing')
      const w = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'), 10)
      if (Number.isFinite(w)) localStorage.setItem(SIDEBAR_W_KEY, String(w))
      window.removeEventListener('mousemove', onMove)
      window.removeEventListener('touchmove', onMove)
      window.removeEventListener('mouseup', onUp)
      window.removeEventListener('touchend', onUp)
    }
    const onDown = (e) => {
      dragging = true
      resizer.classList.add('dragging')
      document.body.classList.add('col-resizing')
      window.addEventListener('mousemove', onMove)
      window.addEventListener('touchmove', onMove, { passive: false })
      window.addEventListener('mouseup', onUp)
      window.addEventListener('touchend', onUp)
      e.preventDefault()
    }
    resizer.addEventListener('mousedown', onDown)
    resizer.addEventListener('touchstart', onDown, { passive: false })
    // Double-click resets to the default width.
    resizer.addEventListener('dblclick', () => {
      document.documentElement.style.removeProperty('--sidebar-w')
      localStorage.removeItem(SIDEBAR_W_KEY)
    })
  }

  restoreSidebarWidth()
  initSidebarResizer()

  checkAuth().then((ok) => { if (ok) bootstrap() })
</script>
</body>
