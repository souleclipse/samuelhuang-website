<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<title>Bookmarks · Samuel Huang</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0B0C10;
    --surface: #14161C;
    --surface-2: #1B1E26;
    --line: #262932;
    --ink: #F2F3F5;
    --ink-soft: #B4B7C1;
    --ink-mute: #6E7380;
    --green: #2BC79A;
    --green-bg: #0E2018;
    --orange: #E08A6A;
    --purple: #8B93FF;
    --purple-bg: #1A1B30;
    --yellow: #F5C842;
    --red: #F08080;
    --topbar-h: 56px;
    --sidebar-w: 224px;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ────── Page wrap (max-width) ────── */
  .page-wrap { max-width: 1200px; margin: 0 auto; }

  /* ────── Topbar ────── */
  .topbar {
    height: var(--topbar-h);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px 0 20px;
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 30;
  }
  .sidebar-toggle {
    display: none;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--ink-soft);
    border-radius: 8px;
    width: 34px; height: 34px;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
    align-items: center;
    justify-content: center;
  }
  .sidebar-backdrop {
    display: none;
    position: fixed;
    inset: var(--topbar-h) 0 0 0;
    background: rgba(0,0,0,.5);
    z-index: 45;
  }
  .logo {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    color: var(--ink);
    text-decoration: none;
  }
  .logo-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .search-bar {
    flex: 1;
    position: relative;
  }
  .search-bar input {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink);
    font: inherit;
    font-size: 13.5px;
    padding: 8px 12px 8px 34px;
    outline: none;
    transition: border-color .15s;
    height: 36px;
  }
  .search-bar input:focus { border-color: var(--green); }
  .search-bar input { padding-right: 120px; }
  .search-clear {
    position: absolute;
    right: 90px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    display: none;
    align-items: center;
    justify-content: center;
    border: 0;
    border-radius: 50%;
    background: var(--surface);
    color: var(--ink-mute);
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
    transition: color .12s, background .12s;
  }
  .search-clear.visible { display: flex; }
  .search-clear:hover { color: var(--ink); background: var(--line); }
  .search-bar .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-mute);
    font-size: 14px;
    pointer-events: none;
  }
  .ai-search-btn {
    position: absolute;
    right: 5px;
    top: 50%;
    transform: translateY(-50%);
    height: 28px;
    padding: 0 11px;
    border: 1px solid var(--purple);
    background: var(--purple-bg);
    color: var(--purple);
    border-radius: 6px;
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background .12s, opacity .12s;
  }
  .ai-search-btn:hover { background: #23244a; }
  .ai-search-btn:disabled { opacity: .55; cursor: progress; }

  /* AI answer banner */
  .ai-answer {
    margin: 0 0 14px;
    padding: 13px 15px;
    border: 1px solid var(--purple);
    background: var(--purple-bg);
    border-radius: 10px;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--ink-soft);
  }
  .ai-answer .ai-answer-head {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--purple);
    margin-bottom: 6px;
  }
  .ai-answer .ai-answer-head .dismiss {
    margin-left: auto;
    background: none;
    border: 0;
    color: var(--ink-mute);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
  }
  .ai-answer p { margin: 0; color: var(--ink); }
  .ai-answer .ai-meta { margin-top: 7px; font-size: 11.5px; color: var(--ink-mute); }

  .topbar-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .view-toggle {
    display: flex;
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
  }
  .view-btn {
    background: var(--surface-2);
    border: 0;
    color: var(--ink-mute);
    cursor: pointer;
    font: inherit;
    font-size: 14px;
    padding: 7px 11px;
    transition: background .12s, color .12s;
    line-height: 1;
  }
  .view-btn + .view-btn { border-left: 1px solid var(--line); }
  .view-btn:hover { color: var(--ink); }
  .view-btn.active { background: var(--surface); color: var(--green); }

  /* ────── Add bar (persistent, always visible) ────── */
  .add-bar {
    display: grid;
    grid-template-columns: minmax(0,1fr) auto auto auto;
    align-items: start;
    gap: 10px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
  }
  .add-bar-fields {
    display: grid;
    gap: 8px;
    min-width: 0;
  }
  .add-bar-input {
    flex: 1;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink);
    font: inherit;
    font-size: 13.5px;
    padding: 8px 12px;
    outline: none;
    transition: border-color .15s;
    height: 36px;
    min-width: 0;
  }
  .add-bar-input:focus { border-color: var(--green); }
  .add-bar-input::placeholder { color: var(--ink-mute); }
  .add-bar-select {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink-soft);
    font: inherit;
    font-size: 12.5px;
    padding: 0 10px;
    height: 36px;
    cursor: pointer;
    outline: none;
    flex-shrink: 0;
    max-width: 160px;
  }
  .add-bar-select:focus { border-color: var(--green); }
  .add-bar-btn {
    background: var(--green);
    color: #0B0C10;
    border: none;
    border-radius: 8px;
    padding: 0 16px;
    height: 36px;
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .15s;
    flex-shrink: 0;
  }
  .add-bar-btn:hover { opacity: .85; }
  .add-bar-btn:disabled { opacity: .4; cursor: not-allowed; }
  .add-bar-status {
    font-size: 12px;
    color: var(--ink-mute);
    white-space: nowrap;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 220px;
  }
  .add-bar-status .spinner {
    width: 11px; height: 11px;
    border: 2px solid var(--line);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }
  .add-bar-status.ok { color: var(--green); }
  .add-bar-status.err { color: var(--red); }
  .add-context-input {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink);
    font: inherit;
    font-size: 12.5px;
    line-height: 1.4;
    min-height: 34px;
    max-height: 84px;
    padding: 8px 12px;
    resize: vertical;
    outline: none;
  }
  .add-context-input:focus { border-color: var(--green); }
  .add-context-input::placeholder { color: var(--ink-mute); }

  /* ────── Auth overlay ────── */
  .auth-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(7,8,11,.96);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .auth-overlay.visible { display: flex; }
  .auth-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 36px 32px 32px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    position: relative;
  }
  .auth-circle {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--green-bg);
    border: 2px solid var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 22px;
    box-shadow: 0 0 0 8px rgba(43,199,154,.08);
  }
  .auth-circle svg { width: 30px; height: 30px; color: var(--green); }
  .auth-card h2 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -.01em;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .auth-sub {
    font-size: 13px;
    color: var(--ink-mute);
    margin-bottom: 24px;
  }
  .pin-form { display: flex; flex-direction: column; gap: 10px; }
  .pin-form input {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--ink);
    font: inherit;
    font-size: 16px;
    padding: 14px 16px;
    outline: none;
    text-align: center;
    letter-spacing: .08em;
    transition: border-color .15s, box-shadow .15s;
  }
  .pin-form input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(43,199,154,.15); }
  .btn-unlock {
    background: var(--green);
    color: #0B0C10;
    border: none;
    border-radius: 12px;
    padding: 14px 0;
    width: 100%;
    font: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .btn-unlock:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
  .btn-unlock:disabled { opacity: .4; cursor: not-allowed; }
  .pin-error { color: var(--red); font-size: 13px; margin-top: 10px; display: none; }
  .pin-error.visible { display: block; }

  /* ────── Shell ────── */
  .app-shell { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: calc(100vh - var(--topbar-h)); position: relative; }
  .app-shell.locked { display: none; }

  .sidebar-resizer {
    position: absolute;
    top: 0;
    bottom: 0;
    left: var(--sidebar-w);
    width: 9px;
    margin-left: -5px;
    cursor: col-resize;
    z-index: 26;
    touch-action: none;
  }
  .sidebar-resizer::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0; left: 4px;
    width: 1px;
    background: transparent;
    transition: background .12s;
  }
  .sidebar-resizer:hover::after,
  .sidebar-resizer.dragging::after { background: var(--green); width: 2px; }
  body.col-resizing { cursor: col-resize; user-select: none; }

  /* ────── Sidebar ────── */
  .sidebar {
    border-right: 1px solid var(--line);
    padding: 12px 10px;
    position: sticky;
    top: var(--topbar-h);
    height: calc(100vh - var(--topbar-h));
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--line) transparent;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 9px;
    width: 100%;
    border: 0;
    background: transparent;
    color: var(--ink-soft);
    font: inherit;
    font-size: 13.5px;
    text-align: left;
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .1s, color .1s;
    position: relative;
  }
  .nav-item:hover { background: var(--surface-2); color: var(--ink); }
  .nav-item.drop-target { outline: 1px solid var(--green); background: var(--green-bg); color: var(--green); }
  .nav-item.active { background: var(--surface); color: var(--green); font-weight: 600; }
  .nav-item .icon { font-size: 14px; flex-shrink: 0; width: 18px; text-align: center; }
  .nav-item .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nav-item .count {
    font-size: 11px;
    color: var(--ink-mute);
    background: var(--surface-2);
    border-radius: 999px;
    padding: 1px 7px;
    flex-shrink: 0;
  }
  .nav-item.active .count { color: var(--green); }
  .folder-actions {
    display: none;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
  }
  .nav-item:hover .folder-actions { display: flex; }
  .folder-action {
    width: 22px;
    height: 22px;
    border: 1px solid transparent;
    border-radius: 5px;
    background: transparent;
    color: var(--ink-mute);
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
  }
  .folder-action:hover { color: var(--ink); border-color: var(--line); background: var(--surface-2); }
  .folder-action.danger:hover { color: var(--red); border-color: #4A2020; }

  .nav-group { position: relative; }
  .folder-drag, .folder-drag-sub {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    line-height: 1;
    color: var(--ink-mute);
    cursor: grab;
    opacity: 0;
    transition: opacity .12s;
  }
  .nav-item:hover .folder-drag,
  .nav-item:hover .folder-drag-sub { opacity: .55; }
  .folder-drag:hover, .folder-drag-sub:hover { opacity: 1 !important; color: var(--ink); }
  .folder-drag:active, .folder-drag-sub:active { cursor: grabbing; }
  .sortable-ghost { opacity: .4; }

  .sidebar-sep {
    height: 1px;
    background: var(--line);
    margin: 8px 4px;
  }

  .folders-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2px 8px 4px 10px;
  }
  .folders-head-label {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .new-folder-btn {
    border: 1px solid var(--line);
    background: var(--surface-2);
    color: var(--ink-soft);
    border-radius: 6px;
    font: inherit;
    font-size: 11.5px;
    font-weight: 600;
    padding: 3px 8px;
    cursor: pointer;
    transition: color .12s, border-color .12s, background .12s;
  }
  .new-folder-btn:hover { color: var(--green); border-color: var(--green); background: var(--green-bg); }

  /* Expand/collapse arrow */
  .nav-item .arrow {
    font-size: 9px;
    color: var(--ink-mute);
    flex-shrink: 0;
    transition: transform .2s;
    margin-right: 2px;
  }
  .nav-item.expanded .arrow { transform: rotate(90deg); }

  /* Sub-nav (children of a collection) */
  .sub-nav {
    padding-left: 10px;
    overflow: hidden;
    max-height: 0;
    transition: max-height .25s ease;
  }
  .sub-nav.open { max-height: 500px; }
  .sub-nav .nav-item { font-size: 12.5px; padding: 5px 10px; }
  .sub-nav .nav-item .icon { font-size: 12px; width: 14px; }

  /* ────── Main ────── */
  .main { min-width: 0; display: flex; flex-direction: column; }

  /* Sub-panel: tag filter bar shown when inside a collection that has tags */
  .sub-panel {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
    overflow-x: auto;
    scrollbar-width: none;
    flex-wrap: nowrap;
  }
  .sub-panel.visible { display: flex; }
  .sub-panel::-webkit-scrollbar { display: none; }
  .sub-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--ink-mute);
    flex-shrink: 0;
  }
  .tag-chip {
    flex-shrink: 0;
    border: 1px solid var(--line);
    background: var(--surface-2);
    color: var(--ink-soft);
    border-radius: 999px;
    padding: 4px 12px;
    font: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: border-color .12s, color .12s, background .12s;
    white-space: nowrap;
  }
  .tag-chip:hover { color: var(--ink); border-color: var(--ink-soft); }
  .tag-chip.active { color: var(--green); border-color: var(--green); background: var(--green-bg); }

  /* ────── Sub-collection grid ────── */
  .subcol-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    padding: 14px 20px 4px;
  }
  .subcol-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
  }
  .subcol-card:hover { border-color: var(--green); background: var(--green-bg); }
  .subcol-card .sc-icon { font-size: 22px; }
  .subcol-card .sc-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .subcol-card .sc-count { font-size: 11.5px; color: var(--ink-mute); }
  .sc-recent {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-top: 4px;
    min-height: 36px;
  }
  .sc-recent-item {
    font-size: 11px;
    color: var(--ink-mute);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .sc-open {
    margin-top: 4px;
    font-size: 11.5px;
    color: var(--green);
  }
  .sc-actions {
    position: absolute;
    top: 10px;
    right: 10px;
    display: none;
    gap: 4px;
  }
  .subcol-card:hover .sc-actions { display: flex; }
  .home-quick {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
    padding: 12px 20px 0;
  }
  .quick-card {
    border: 1px solid var(--line);
    background: var(--surface);
    border-radius: 8px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .quick-card:hover { border-color: var(--green); background: var(--green-bg); }
  .quick-card-title { font-size: 13px; color: var(--ink); font-weight: 650; margin-bottom: 6px; }
  .quick-card-meta { font-size: 11.5px; color: var(--ink-mute); }
  .home-section-title {
    padding: 16px 20px 0;
    font-size: 11px;
    font-weight: 750;
    letter-spacing: .11em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }

  .main-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px 8px;
    gap: 12px;
  }
  .main-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: .1em;
    white-space: nowrap;
  }
  .toolbar-right { display: flex; align-items: center; gap: 8px; }
  .enhance-blanks-btn {
    border: 1px solid var(--purple);
    background: var(--purple-bg);
    color: var(--purple);
    border-radius: 7px;
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .12s, opacity .12s;
  }
  .enhance-blanks-btn:hover { background: #23244a; }
  .enhance-blanks-btn:disabled { opacity: .6; cursor: progress; }
  .sync-status {
    font-size: 11.5px;
    color: var(--ink-mute);
    white-space: nowrap;
  }
  .sync-status.warn { color: var(--orange); }
  .result-count {
    font-size: 12px;
    color: var(--ink-mute);
  }
  .sort-select {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--ink-soft);
    font: inherit;
    font-size: 12px;
    padding: 4px 8px;
    cursor: pointer;
    outline: none;
    height: 28px;
  }
  .sort-select:focus { border-color: var(--green); }

  .main-body { flex: 1; padding: 0 20px 80px; }

  /* ────── Card grid ────── */
  .grid-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
    padding-top: 4px;
  }
  .bm-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    transition: border-color .15s;
  }
  .bm-card:hover { border-color: #3A3F4E; }
  .bm-card-head { display: flex; align-items: flex-start; gap: 8px; }
  .bm-favicon {
    width: 18px; height: 18px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
    background: var(--surface-2);
    object-fit: cover;
  }
  .bm-title {
    font-size: 13.5px;
    font-weight: 600;
    line-height: 1.4;
    flex: 1;
    min-width: 0;
  }
  .bm-title a { color: var(--ink); text-decoration: none; }
  .bm-title a:hover { color: var(--green); }
  .bm-domain { font-size: 11.5px; color: var(--ink-mute); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bm-desc {
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .bm-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-top: auto;
  }
  .bm-tags { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; min-width: 0; }
  .bm-tag {
    font-size: 10.5px;
    color: var(--ink-mute);
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1px 6px;
    white-space: nowrap;
  }
  .bm-tag.folder-tag {
    color: var(--green);
    border-color: rgba(43,199,154,.45);
    background: var(--green-bg);
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bm-tag.folder-tag .fp-parent { opacity: .65; font-weight: 400; }
  .bm-tag.folder-tag .fp-sep { opacity: .5; margin: 0 4px; }
  .bm-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .bm-actions .icon-btn { opacity: 0; transition: color .12s, border-color .12s, background .12s, opacity .12s; }
  .bm-card:hover .bm-actions .icon-btn { opacity: 1; }
  .bm-actions .icon-btn.fav.starred { opacity: 1; }
  .icon-btn {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 7px;
    color: var(--ink-soft);
    cursor: pointer;
    font: inherit;
    font-size: 12px;
    min-width: 30px;
    height: 28px;
    padding: 0 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: color .12s, border-color .12s, background .12s, opacity .12s;
    line-height: 1;
  }
  .icon-btn:hover { color: var(--ink); background: #222631; border-color: #3A3F4E; }
  .icon-btn.fav.starred { color: var(--yellow); }
  .icon-btn.danger:hover { color: var(--red); border-color: #6A2A2A; background: #2A1616; }
  .icon-btn.edit { color: var(--green); border-color: rgba(43,199,154,.35); background: var(--green-bg); }
  .icon-btn.edit:hover { color: #71f0cc; border-color: var(--green); }

  /* ────── List view ────── */
  .list-view { display: flex; flex-direction: column; padding-top: 4px; }
  .list-row {
    display: grid;
    grid-template-columns: 30px 18px minmax(0,1fr) auto auto;
    align-items: start;
    gap: 10px;
    padding: 9px 14px;
    border-bottom: 1px solid var(--line);
    transition: background .1s;
    cursor: pointer;
  }
  .list-row:hover { background: var(--surface); }
  .row-gutter { display: flex; align-items: center; gap: 4px; align-self: center; }
  .list-row:last-child { border-bottom: 0; }
  .list-favicon {
    width: 16px; height: 16px;
    border-radius: 3px;
    background: var(--surface-2);
    object-fit: cover;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .list-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .list-title {
    font-size: 13.5px;
    font-weight: 550;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .list-title a { color: var(--ink); text-decoration: none; }
  .list-title a:hover { color: var(--green); }
  .list-desc {
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .list-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    overflow: hidden;
  }
  .list-domain { font-size: 11.5px; color: var(--ink-mute); white-space: nowrap; }
  .list-tags { display: flex; gap: 4px; overflow: hidden; flex: 1; }
  .list-actions { display: flex; gap: 6px; justify-content: flex-end; align-self: center; }
  /* Calm by default: Edit/✕ reveal on row hover; a gold star stays if favorited. */
  .list-actions .icon-btn { opacity: 0; }
  .list-row:hover .list-actions .icon-btn { opacity: 1; }
  .list-actions .icon-btn.fav.starred { opacity: 1; }
  /* Ghost folder picker: reads as quiet text, becomes a control on hover/focus. */
  .row-move-select {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 6px;
    color: var(--ink-mute);
    font: inherit;
    font-size: 11.5px;
    height: 28px;
    min-width: 0;
    max-width: 150px;
    padding: 0 4px;
    cursor: pointer;
    align-self: center;
    opacity: .75;
    transition: color .12s, border-color .12s, background .12s, opacity .12s;
  }
  .list-row:hover .row-move-select { opacity: 1; color: var(--ink-soft); }
  .row-move-select:hover,
  .row-move-select:focus { border-color: var(--line); background: var(--surface-2); color: var(--ink); outline: none; }

  /* ────── Move-to popover ────── */
  .move-select {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--ink);
    font: inherit;
    font-size: 12px;
    padding: 4px 6px;
    cursor: pointer;
  }
  .multi-move-select {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink-soft);
    font: inherit;
    font-size: 13px;
    height: 32px;
    max-width: 180px;
    padding: 0 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ────── Sort history panel ────── */
  .history-panel { padding: 20px; display: flex; flex-direction: column; gap: 8px; }
  .history-row {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .history-url { font-size: 12.5px; color: var(--ink-soft); word-break: break-all; margin-bottom: 6px; }
  .history-meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--ink-mute); }
  .history-meta strong { color: var(--green); }

  /* ────── Help panel ────── */
  .help-panel {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 4px 0 40px;
    max-width: 820px;
  }
  .help-section {
    border: 1px solid var(--line);
    background: var(--surface);
    border-radius: 10px;
    padding: 16px;
  }
  .help-section h3 {
    font-size: 14px;
    margin-bottom: 10px;
    color: var(--ink);
  }
  .help-section ul {
    padding-left: 18px;
    color: var(--ink-soft);
    font-size: 13px;
    line-height: 1.7;
  }
  .help-section code {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1px 5px;
    color: var(--green);
  }

  /* ────── ENG - THAI panel ────── */
  .translate-panel {
    display: grid;
    gap: 12px;
    max-width: 860px;
    padding: 4px 0 40px;
  }
  .translate-card {
    border: 1px solid var(--line);
    background: var(--surface);
    border-radius: 10px;
    padding: 16px;
    display: grid;
    gap: 12px;
  }
  .translate-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 12px;
  }
  .translate-field { display: grid; gap: 7px; min-width: 0; align-content: start; }
  .translate-field:first-child { grid-column: 1 / -1; }
  .translate-field label {
    font-size: 11.5px;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: .08em;
    font-weight: 700;
  }
  .translate-field textarea,
  .translate-output {
    width: 100%;
    min-height: 180px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink);
    font: inherit;
    font-size: 15px;
    line-height: 1.6;
    padding: 11px 12px;
    outline: none;
    resize: vertical;
  }
  .translate-field textarea:focus { border-color: var(--green); }
  .translate-output {
    position: relative;
    resize: none;
    padding: 16px 16px 42px;
    cursor: pointer;
    transition: border-color .12s, background .12s;
  }
  #translateEnglish,
  .translate-main,
  #translateThaiRomanization {
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  .translate-output:hover {
    border-color: rgba(43,199,154,.55);
    background: #1D212B;
  }
  .translate-output::after {
    content: 'Click to copy';
    position: absolute;
    right: 12px;
    bottom: 10px;
    color: var(--ink-mute);
    font-size: 11px;
    font-weight: 650;
    letter-spacing: .02em;
  }
  .translate-output:not(.has-output)::after {
    content: '';
  }
  .translate-output-combo {
    display: block;
  }
  .translate-main {
    min-height: 28px;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  .translate-pronunciation {
    border-top: 1px solid var(--line);
    color: var(--ink-soft);
    font-size: 14px;
    line-height: 1.55;
    margin-top: 14px;
    padding-top: 12px;
  }
  .translate-pronunciation span {
    display: block;
    color: var(--ink-mute);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .08em;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .translate-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .translate-btn {
    border: 1px solid var(--line);
    background: var(--surface-2);
    color: var(--ink-soft);
    border-radius: 8px;
    padding: 8px 12px;
    font: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  .translate-btn.primary {
    background: var(--green);
    border-color: var(--green);
    color: #0B0C10;
    font-weight: 700;
  }
  .translate-btn:hover { color: var(--ink); }
  .translate-btn.primary:hover { color: #0B0C10; opacity: .88; }
  .translate-btn:disabled { opacity: .55; cursor: progress; }
  .translate-status { font-size: 12px; color: var(--ink-mute); }
  .translate-status.err { color: var(--red); }
  .translate-status.ok { color: var(--green); }
  .translate-meta { font-size: 11.5px; color: var(--ink-mute); }

  /* ────── Empty / loading ────── */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--ink-mute);
    display: none;
  }
  .empty-state.visible { display: block; }
  .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }
  .loading { text-align: center; padding: 60px; color: var(--ink-mute); font-size: 14px; }
  .error-panel {
    border: 1px solid #4A2020;
    background: #241414;
    border-radius: 10px;
    color: var(--ink-soft);
    margin-top: 8px;
    padding: 16px;
  }
  .error-panel strong { color: var(--red); display: block; margin-bottom: 4px; }
  .error-panel button {
    margin-top: 12px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 7px;
    padding: 7px 12px;
    font: inherit;
    font-size: 12px;
    cursor: pointer;
  }

  /* ────── Toast ────── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1A2E1F;
    border: 1px solid #1E4A2A;
    color: var(--green);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    z-index: 200;
    transition: transform .25s ease;
    white-space: nowrap;
  }
  .toast.err { background: #2A1616; border-color: #4A2020; color: var(--red); }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast .toast-undo {
    margin-left: 12px;
    background: transparent;
    border: 1px solid currentColor;
    color: inherit;
    border-radius: 6px;
    font: inherit;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    cursor: pointer;
  }
  .toast .toast-undo:hover { background: rgba(255,255,255,.08); }

  /* Recently deleted (trash) view */
  .trash-info {
    margin: 0 0 12px;
    padding: 10px 14px;
    border: 1px dashed var(--line);
    border-radius: 9px;
    background: var(--surface);
    color: var(--ink-mute);
    font-size: 12.5px;
  }
  .trash-row { grid-template-columns: 18px minmax(0,1fr) auto; }
  .trash-row .trash-when { color: var(--ink-mute); }
  .trash-row .list-actions .icon-btn { width: auto; padding: 5px 10px; font-size: 12px; opacity: 1; }

  /* ────── Edit modal ────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 180;
    background: rgba(7,8,11,.82);
    align-items: center;
    justify-content: center;
    padding: 18px;
  }
  .modal-overlay.visible { display: flex; }
  .edit-modal {
    width: min(720px, 100%);
    max-height: min(820px, 92vh);
    overflow: auto;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: 0 24px 80px rgba(0,0,0,.55);
  }
  .edit-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
  }
  .edit-head h2 { font-size: 15px; }
  .edit-body { padding: 16px 18px; display: grid; gap: 12px; }
  .field { display: grid; gap: 6px; }
  .field label { font-size: 11.5px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }
  .field input, .field textarea, .field select {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink);
    font: inherit;
    font-size: 13px;
    padding: 9px 10px;
    outline: none;
  }
  .field textarea { min-height: 86px; resize: vertical; line-height: 1.5; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--green); }

  /* Folder modal: name + icon picker */
  .folder-modal { width: min(460px, 100%); }
  .folder-name-row { display: flex; align-items: center; gap: 8px; }
  .folder-name-row input { flex: 1; }
  .folder-icon-preview {
    width: 38px; height: 38px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  .folder-parent-chip {
    display: inline-flex; align-items: center;
    font-size: 12.5px; color: var(--ink-soft);
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 7px 10px;
  }
  .icon-grid {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 5px;
  }
  .icon-grid .icon-opt {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    background: var(--surface-2);
    border: 1px solid transparent;
    border-radius: 7px;
    cursor: pointer;
    transition: border-color .1s, background .1s, transform .05s;
  }
  .icon-grid .icon-opt:hover { background: #222631; transform: translateY(-1px); }
  .icon-grid .icon-opt.selected { border-color: var(--green); background: var(--green-bg); }
  .icon-custom { max-width: 160px; margin-top: 8px; }
  @media (max-width: 540px) { .icon-grid { grid-template-columns: repeat(7, 1fr); } }
  .edit-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 14px 18px 18px;
  }
  .edit-actions-left, .edit-actions-right { display: flex; gap: 8px; align-items: center; }
  .modal-btn {
    border: 1px solid var(--line);
    background: var(--surface-2);
    color: var(--ink-soft);
    border-radius: 8px;
    padding: 8px 12px;
    font: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  .modal-btn.primary { background: var(--green); border-color: var(--green); color: #0B0C10; font-weight: 700; }
  .modal-btn:hover { color: var(--ink); }
  .modal-btn.primary:hover { color: #0B0C10; opacity: .88; }
  .modal-status { font-size: 12px; color: var(--ink-mute); }
  .modal-status.err { color: var(--red); }
  .modal-status.ok { color: var(--green); }

  /* ────── Drag handle ────── */
  .drag-handle {
    color: var(--ink-mute);
    cursor: grab;
    font-size: 13px;
    line-height: 1;
    flex-shrink: 0;
    user-select: none;
    opacity: 0;
    transition: opacity .15s;
    padding: 2px 3px;
  }
  .bm-card:hover .drag-handle,
  .list-row:hover .drag-handle { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }
  .sortable-ghost { opacity: .35; }
  .sortable-drag { opacity: .9; box-shadow: 0 8px 24px rgba(0,0,0,.5); }

  /* ────── Checkbox ────── */
  .bm-check {
    appearance: none;
    width: 15px; height: 15px;
    border: 1.5px solid var(--line);
    border-radius: 4px;
    background: var(--surface-2);
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    transition: border-color .12s, background .12s;
  }
  .bm-check:checked {
    background: var(--green);
    border-color: var(--green);
  }
  .bm-check:checked::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #0B0C10;
    font-weight: 700;
  }
  /* Show checkboxes on hover or when any is checked */
  .bm-check { opacity: 0; transition: opacity .15s, border-color .12s, background .12s; }
  .bm-card:hover .bm-check,
  .list-row:hover .bm-check,
  .bm-check:checked,
  .has-selection .bm-check { opacity: 1; }

  /* Clickable card */
  .bm-card { cursor: pointer; }
  .bm-card.selected { border-color: var(--green); background: var(--green-bg); }
  .list-row.selected { background: var(--green-bg); }

  /* ────── Multi-select bar ────── */
  .multi-bar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    transition: transform .25s cubic-bezier(.2,.8,.4,1);
    white-space: nowrap;
  }
  .multi-bar.show { transform: translateX(-50%) translateY(0); }
  body.translator-mode .multi-bar { display: none !important; }
  .multi-bar-count { font-size: 13px; font-weight: 600; color: var(--ink-soft); }
  .multi-bar-btn {
    background: var(--green);
    color: #0B0C10;
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s;
  }
  .multi-bar-btn:hover { opacity: .85; }
  .multi-bar-clear {
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--ink-mute);
    padding: 7px 12px;
    font: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  .multi-bar-clear:hover { color: var(--ink); border-color: var(--ink-soft); }

  /* ────── Mobile ────── */
  @media (max-width: 820px) {
    :root { --sidebar-w: 0px; }
    .app-shell { grid-template-columns: 1fr; }
    .sidebar-resizer { display: none; }
    .sidebar-toggle { display: inline-flex; }

    /* Sidebar becomes a slide-in drawer */
    .sidebar {
      display: block;
      position: fixed;
      top: var(--topbar-h); left: 0; bottom: 0;
      width: 280px; max-width: 84vw;
      transform: translateX(-100%);
      transition: transform .25s ease;
      z-index: 46;
      background: var(--bg);
      box-shadow: 0 0 40px rgba(0,0,0,.5);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-backdrop.show { display: block; }

    .sub-panel { padding: 8px 14px; }
    .add-bar { padding: 8px 14px; gap: 6px; grid-template-columns: minmax(0,1fr) auto auto; }
    .add-bar-select { max-width: 120px; }
    .add-bar-status { display: none; }
    .main-toolbar { padding: 10px 14px 6px; }
    .toolbar-right { flex-wrap: wrap; justify-content: flex-end; }
    .sync-status { display: none; }
    .main-body { padding: 0 14px 80px; }
    .grid-view { grid-template-columns: 1fr 1fr; }
    .translate-grid { grid-template-columns: 1fr; }

    /* Touch has no hover: drop the drag/checkbox gutter + folder select,
       and keep the row actions permanently visible. */
    .list-row { grid-template-columns: 18px minmax(0,1fr) auto; }
    .row-gutter, .row-move-select { display: none; }
    .list-actions .icon-btn, .bm-actions .icon-btn { opacity: 1; }
    .subcol-grid { padding: 10px 14px 4px; }
  }
  @media (max-width: 540px) {
    .grid-view { grid-template-columns: 1fr; }
    .search-bar { max-width: none; }
    .add-bar-select { display: none; }
    .add-bar { grid-template-columns: minmax(0,1fr) auto; }
    /* Compact the Ask AI button to just the sparkle */
    .ai-search-btn { font-size: 0; padding: 0 9px; }
    .ai-search-btn::before { content: '✨'; font-size: 13px; }
    .search-bar input { padding-right: 74px; }
    .search-clear { right: 42px; }
  }
</style>
</head>
<body>

<div class="page-wrap">
<!-- Topbar -->
<header class="topbar">
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Open menu" onclick="toggleMobileSidebar()">☰</button>

    <span class="search-icon">⌕</span>

<!-- Auth overlay -->

<!-- App shell -->
<div class="app-shell locked" id="appShell">

  <!-- Mobile drawer backdrop -->
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeMobileSidebar()"></div>

  <!-- Draggable divider to resize the sidebar -->
  <div class="sidebar-resizer" id="sidebarResizer" title="Drag to resize sidebar"></div>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <button class="nav-item active" data-filter="all" onclick="selectFilter('all')">
      <span class="icon">📚</span><span class="label">All bookmarks</span><span class="count" id="countAll">–</span>
    </button>
    <button class="nav-item" data-filter="translate" onclick="selectFilter('translate')">
      <span class="icon">⇄</span><span class="label">ENG - THAI</span>
    </button>
    <button class="nav-item" data-filter="favorites" onclick="selectFilter('favorites')">
      <span class="icon">⭐</span><span class="label">Favorites</span><span class="count" id="countFav">–</span>
    </button>
    <button class="nav-item" data-filter="recent" onclick="selectFilter('recent')">
      <span class="icon">🕘</span><span class="label">Recently added</span><span class="count" id="countRecent">10</span>
    </button>
    <div class="sidebar-sep"></div>

    </div>

    <div class="sidebar-sep"></div>
    <button class="nav-item" data-filter="help" onclick="selectFilter('help')">

    <div class="sidebar-sep"></div>

    </button>

      <span class="icon">🕘</span><span class="label">Sort history</span>
    </button>
  </nav>

  <!-- Main -->
  <div class="main" id="mainArea">

    <!-- Persistent add bar -->
    <div class="add-bar" id="addBar">
      <div class="add-bar-fields">
        <input class="add-bar-input" id="addUrl" type="url" placeholder="Paste URL to add bookmark… (Enter to AI-sort)" autocomplete="off">
        <textarea class="add-context-input" id="addContext" placeholder="Optional: add context for AI sorting / saved description, e.g. login page for client reporting dashboard"></textarea>
      </div>
      <select class="add-bar-select" id="addCollection" title="Folder (optional). AI still writes the title, description & tags either way — this only sets where it's filed.">
        <option value="">AI sort (auto folder)</option>
      </select>
      <button class="add-bar-btn" id="addBtn" onclick="addBookmark()">Add</button>
      <div class="add-bar-status" id="addStatus"></div>
    </div>

    <!-- Sub-panel (tag filters, visible when inside a collection with tags) -->
    <div class="sub-panel" id="subPanel">
      <span class="sub-label">Filter:</span>
      <button class="tag-chip active" data-tag="" onclick="selectTag(this,'')">All</button>
    </div>

    <!-- Sub-collection grid (shown when a parent collection is selected) -->
    <div id="subColGrid" style="display:none"></div>

    <!-- Toolbar -->
    <div class="main-toolbar" id="mainToolbar">
      <span class="main-title" id="mainTitle">All bookmarks</span>
      <div class="toolbar-right">
        <span class="sync-status" id="syncStatus"></span>
        <button class="enhance-blanks-btn" id="enhanceBlanksBtn" style="display:none" title="Use AI to write descriptions for bookmarks that have none" onclick="runEnhanceBlanks()"></button>
        <span class="result-count" id="resultCount"></span>
        <select class="sort-select" id="sortSelect" onchange="applyFilters()">
          <option value="manual">Manual order</option>
          <option value="date-desc">Newest first</option>
          <option value="date-asc">Oldest first</option>
          <option value="title-asc">Title A→Z</option>
          <option value="title-desc">Title Z→A</option>

    <!-- Bookmark content -->
    <div class="main-body" id="mainBody">

      <div id="listContainer" class="list-view"><div class="loading">Loading…</div></div>

        <p>No bookmarks here yet.<br>Paste a URL above to add your first one.</p>

      <!-- History panel -->

</div>

</div><!-- /page-wrap -->

<!-- Multi-select bar -->

  <span class="multi-bar-count" id="multiCount">0 selected</span>
  <select class="multi-move-select" id="multiMoveSelect" onchange="moveSelectedToCollection(this.value)">

<div class="toast" id="toast"></div>

<!-- Folder create/rename modal -->

        <button class="modal-btn primary" id="folderSaveBtn" onclick="saveFolderModal()">Create</button>
      </div>

<script>
  let collections = []
  let flatCollections = []
  let currentFilter = 'all'
  let currentSlug = null
  let currentTag = ''
  let currentView = 'list'
  let allBookmarks = []
  let searchTimer
  let selectedIds = new Set()
  let sortableGrid = null
  let sortableList = null
  let draggedBookmarkId = null
  let lastRenderedBookmarks = []
  let aiResults = null
  let aiSearching = false
  let trashRetentionDays = 30
  const CACHE_TTL_MS = 1000 * 60 * 60 * 12
  const CACHE_KEYS = {
    collections: 'samuel_bookmark_collections_v2',
    bookmarks: 'samuel_bookmarks_all_v1',
  }

  // ── Helpers ──────────────────────────────
  const esc = (v) => String(v ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
  const domain = (url) => { try { return new URL(url).hostname.replace(/^www\./,'') } catch { return '' } }
  const favicon = (b) => b.favicon_url || (domain(b.url) ? `https://www.google.com/s2/favicons?sz=64&domain=${encodeURIComponent(domain(b.url))}` : '')
  const fmtDate = (iso) => { try { return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) } catch { return '' } }

  function showToast(msg, type='') {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.className = 'toast show' + (type ? ' '+type : '')
    clearTimeout(t._timer)
    t._timer = setTimeout(() => t.classList.remove('show'), 3000)
  }

  function showUndoToast(msg, onUndo) {
    const t = document.getElementById('toast')
    t.textContent = ''
    const span = document.createElement('span'); span.textContent = msg
    const btn = document.createElement('button'); btn.className = 'toast-undo'; btn.textContent = 'Undo'
    btn.addEventListener('click', () => {
      clearTimeout(t._timer); t.classList.remove('show'); t.textContent = ''
      onUndo()
    })
    t.appendChild(span); t.appendChild(btn)
    t.className = 'toast show'
    clearTimeout(t._timer)
    t._timer = setTimeout(() => { t.classList.remove('show'); t.textContent = '' }, 6000)
  }

  function apiFetch(url, opts={}) {
    return fetch(url, { ...opts, credentials: 'same-origin', headers: new Headers(opts.headers||{}) })
  }

  // Parse a response as JSON, but never throw a raw "Unexpected token" at the user.
  // If the server returned a non-JSON body (e.g. a Vercel timeout/error page),
  // surface a clean message keyed off the status instead.
  async function safeJson(res) {
    const text = await res.text()
    try { return JSON.parse(text) } catch {}
    if (res.status === 504 || res.status === 408) return { error: 'The AI took too long and timed out. Please try again.' }
    if (res.status >= 500) return { error: 'The server hit an error. Please try again.' }
    return { error: 'Unexpected response from the server. Please try again.' }
  }

  function readCache(key) {
    try {
      const cached = JSON.parse(localStorage.getItem(key) || 'null')
      if (!cached || Date.now() - cached.savedAt > CACHE_TTL_MS) return null
      return cached.value
    } catch { return null }
  }

  function readCacheMeta(key) {
    try {
      const cached = JSON.parse(localStorage.getItem(key) || 'null')
      return cached?.savedAt ? cached : null
    } catch { return null }
  }

  function writeCache(key, value) {
    try {
      localStorage.setItem(key, JSON.stringify({ savedAt: Date.now(), value }))
    } catch {}
  }

  function cacheCurrentBookmarks() {
    if (currentFilter === 'all' && !document.getElementById('searchInput').value.trim()) {
      writeCache(CACHE_KEYS.bookmarks, { bookmarks: allBookmarks })
    }
  }

  function mergeBookmark(bookmark) {
    const index = allBookmarks.findIndex((b) => b.id === bookmark.id)
    if (index === -1) allBookmarks = [bookmark, ...allBookmarks]
    else allBookmarks = allBookmarks.map((b) => b.id === bookmark.id ? bookmark : b)
    cacheCurrentBookmarks()
  }

  function setSyncStatus(msg, mode='') {
    const el = document.getElementById('syncStatus')
    el.textContent = msg || ''
    el.className = 'sync-status' + (mode ? ' ' + mode : '')
  }

  function updateLastSynced(savedAt=Date.now()) {
    const delta = Math.max(0, Date.now() - savedAt)
    const mins = Math.floor(delta / 60000)
    setSyncStatus(mins < 1 ? 'Synced just now' : `Synced ${mins}m ago`)
  }

  function showDataError(message, retryFn) {
    const html = `<div class="error-panel"><strong>${esc(message)}</strong><span>Showing the last saved copy when available.</span><br><button type="button" id="retryLoadBtn">Retry</button></div>`
    const target = currentView === 'grid' ? document.getElementById('gridContainer') : document.getElementById('listContainer')
    if (!target.children.length) target.innerHTML = html
    const btn = document.getElementById('retryLoadBtn')
    if (btn) btn.onclick = retryFn
    setSyncStatus('Sync failed', 'warn')
  }

  function hydrateFromCache() {
    const cachedCollections = readCache(CACHE_KEYS.collections)
    if (cachedCollections) {
      collections = cachedCollections.collections || []
      flatCollections = cachedCollections.flat || []
      renderSidebar()
      populateAddBarSelect()
    }

    const cachedBookmarks = readCache(CACHE_KEYS.bookmarks)
    if (cachedBookmarks?.bookmarks?.length) {
      allBookmarks = cachedBookmarks.bookmarks
      document.getElementById('countFav').textContent = allBookmarks.filter((b) => b.is_favorite).length || 0
      document.getElementById('countRecent').textContent = Math.min(10, allBookmarks.length)
      populateMoveSelect()
      renderSubColGrid()
      buildSubPanel(allBookmarks)
      applyFilters()
      updateLastSynced(readCacheMeta(CACHE_KEYS.bookmarks)?.savedAt)
      return true
    }
    return false
  }

  // ── Auth ──────────────────────────────────
  function showAuth(msg='') {
    document.getElementById('appShell').classList.add('locked')
    document.getElementById('authOverlay').classList.add('visible')
    if (msg) {
      const e = document.getElementById('pinError'); e.textContent = msg; e.classList.add('visible')
    }
    setTimeout(() => { const i = document.getElementById('pinInput'); if (i) i.focus() }, 50)
  }

  function showApp() {
    document.getElementById('authOverlay').classList.remove('visible')
    document.getElementById('appShell').classList.remove('locked')
  }

  async function checkAuth() {
    try {
      const res = await fetch('/api/dashboard-auth', { credentials: 'same-origin' })
      const d = await res.json()
      if (!d.authenticated) { showAuth('Enter your dashboard password.'); return false }
      showApp(); return true
    } catch { showAuth('Could not check access.'); return false }
  }

  async function unlockApp() {
    const pass = document.getElementById('pinInput').value
    const btn = document.getElementById('unlockBtn')
    btn.disabled = true; btn.textContent = '…'
    try {
      const res = await fetch('/api/dashboard-auth', {
        method: 'POST', credentials: 'same-origin',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ password: pass }),
      })
      if (!res.ok) {
        const data = await res.json().catch(() => ({}))
        showAuth(data.error || 'Incorrect password.')
        return
      }
      document.getElementById('pinInput').value = ''
      document.getElementById('pinError').classList.remove('visible')
      showApp(); await bootstrap()
    } catch { showAuth('Could not unlock.') }
    finally { btn.disabled = false; btn.textContent = 'Unlock' }
  }

  // ── Mobile drawer ─────────────────────────
  function toggleMobileSidebar() {
    const open = document.getElementById('sidebar').classList.toggle('open')
    document.getElementById('sidebarBackdrop').classList.toggle('show', open)
  }
  function closeMobileSidebar() {
    document.getElementById('sidebar').classList.remove('open')
    document.getElementById('sidebarBackdrop').classList.remove('show')
  }

  // ── View toggle ────────────────────────────
  function setView(v) {
    currentView = v
    document.getElementById('btnGrid').classList.toggle('active', v === 'grid')
    document.getElementById('btnList').classList.toggle('active', v === 'list')
    document.getElementById('gridContainer').style.display = v === 'grid' ? '' : 'none'
    document.getElementById('listContainer').style.display = v === 'list' ? '' : 'none'
    applyFilters()
  }

  // ── Sidebar ────────────────────────────────
  let openParentSlugs = new Set()  // which parent folders are expanded (persist across re-renders)

  function parentItemHtml(c) {
    const hasChildren = c.children && c.children.length > 0
    const arrow = hasChildren ? `<span class="arrow">▶</span>` : ''
    const actions = c.id === '__inbox' ? '' : `
        <span class="folder-actions">
          <span class="folder-action" title="Add subfolder" data-folder-action="add-sub">＋</span>
          <span class="folder-action" title="Edit folder" data-folder-action="edit">✎</span>
          <span class="folder-action danger" title="Delete folder" data-folder-action="delete">×</span>
        </span>`
    const dragHandle = c.id === '__inbox' ? '' : `<span class="folder-drag" title="Drag to reorder folders">⠿</span>`
    return `
      <div class="nav-group" data-slug="${esc(c.slug)}">
      <button class="nav-item" data-filter="collection" data-slug="${esc(c.slug)}" data-has-children="${hasChildren}">
        ${dragHandle}
        <span class="icon">${esc(c.icon||'📁')}</span>
        <span class="label">${esc(c.name)}</span>
        ${arrow}
        <span class="count">${c.count}</span>
        ${actions}
      </button>
      ${hasChildren ? `<div class="sub-nav" id="sub-${esc(c.slug)}" data-parent="${esc(c.slug)}">
        ${c.children.map((ch) => `
          <button class="nav-item" data-filter="collection" data-slug="${esc(ch.slug)}" data-parent="${esc(c.slug)}">
            <span class="folder-drag-sub" title="Drag to reorder subfolders">⠿</span>
            <span class="icon">${esc(ch.icon||'📁')}</span>
            <span class="label">${esc(ch.name)}</span>
            <span class="count">${ch.count}</span>
            <span class="folder-actions">
              <span class="folder-action" title="Edit folder" data-folder-action="edit">✎</span>
              <span class="folder-action danger" title="Delete folder" data-folder-action="delete">×</span>
            </span>
          </button>`).join('')}
      </div>` : ''}
      </div>
    `
  }

  function renderSidebar() {
    const nav = document.getElementById('collectionNav')
    nav.innerHTML = collections.map(parentItemHtml).join('')
    document.getElementById('countAll').textContent = collections.reduce((s,c) => s+c.count, 0)
    wireCollectionDropTargets(nav)

    // Re-apply any folders the user had expanded, so a background refresh or a
    // new folder doesn't collapse the tree.
    openParentSlugs.forEach((slug) => {
      const sub = document.getElementById(`sub-${slug}`)
      const parentBtn = nav.querySelector(`.nav-item[data-slug="${slug}"]`)
      if (sub) sub.classList.add('open')
      if (parentBtn) parentBtn.classList.add('expanded')
    })

    // Wire click handlers (parent items toggle expand + navigate; child items just navigate)
    nav.querySelectorAll('.nav-item').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        if (e.target.closest('.folder-drag, .folder-drag-sub')) return
        const action = e.target.closest('[data-folder-action]')
        if (action) {
          e.stopPropagation()
          const folder = flatCollections.find((c) => c.slug === btn.dataset.slug)
          if (action.dataset.folderAction === 'add-sub') createFolder(btn.dataset.slug)
          if (action.dataset.folderAction === 'edit') editFolder(folder)
          if (action.dataset.folderAction === 'delete') deleteFolder(folder)
          return
        }
        const slug = btn.dataset.slug
        const hasChildren = btn.dataset.hasChildren === 'true'
        if (hasChildren) {
          // Independent toggle: this folder opens/closes on its own and stays
          // open until clicked again — other expanded folders are left alone.
          const subNav = document.getElementById(`sub-${slug}`)
          const willOpen = !subNav.classList.contains('open')
          subNav.classList.toggle('open', willOpen)
          btn.classList.toggle('expanded', willOpen)
          if (willOpen) openParentSlugs.add(slug)
          else openParentSlugs.delete(slug)
        }
        selectFilter('collection', slug)
        // Mobile: a folder with no subfolders is a final destination → close the
        // drawer. A parent stays open so its subfolders can be reached.
        if (!hasChildren) closeMobileSidebar()
      })
    })

    initSidebarSortable(nav)
  }

  let sidebarSortables = []
  function initSidebarSortable(nav) {
    sidebarSortables.forEach((s) => { try { s.destroy() } catch {} })
    sidebarSortables = []
    if (typeof Sortable === 'undefined') return

    // Reorder top-level folders.
    sidebarSortables.push(Sortable.create(nav, {
      handle: '.folder-drag',
      draggable: '.nav-group',
      animation: 150,
      ghostClass: 'sortable-ghost',
      onEnd() {
        const slugs = [...nav.querySelectorAll(':scope > .nav-group')].map((g) => g.dataset.slug)
        persistFolderOrder(slugs)
      },
    }))

    // Reorder subfolders within each parent.
    nav.querySelectorAll('.sub-nav').forEach((sub) => {
      sidebarSortables.push(Sortable.create(sub, {
        handle: '.folder-drag-sub',
        draggable: '.nav-item',
        animation: 150,
        ghostClass: 'sortable-ghost',
        onEnd() {
          const slugs = [...sub.querySelectorAll('.nav-item')].map((b) => b.dataset.slug)
          persistFolderOrder(slugs)
        },
      }))
    })
  }

  function persistFolderOrder(slugs) {
    const ids = slugs
      .map((s) => flatCollections.find((c) => c.slug === s)?.id)
      .filter((id) => id && id !== '__inbox')
    if (!ids.length) return
    // Update local sort_order so a background reload keeps the new order.
    ids.forEach((id, i) => {
      const f = flatCollections.find((c) => c.id === id); if (f) f.sort_order = (i + 1) * 10
      const p = collections.find((c) => c.id === id); if (p) p.sort_order = (i + 1) * 10
    })
    apiFetch('/api/bookmark-collections', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ reorder: ids }),
    }).then((r) => {
      if (!r.ok) throw new Error('save failed')
      writeCache(CACHE_KEYS.collections, { collections, flat: flatCollections })
      showToast('Folder order saved')
    }).catch(() => showToast('Could not save folder order', 'err'))
  }

  function wireCollectionDropTargets(root=document) {
    root.querySelectorAll('.nav-item[data-filter="collection"]').forEach((btn) => {
      btn.addEventListener('dragover', (e) => {
        if (!draggedBookmarkId && !selectedIds.size) return
        e.preventDefault()
        btn.classList.add('drop-target')
      })
      btn.addEventListener('dragleave', () => btn.classList.remove('drop-target'))
      btn.addEventListener('drop', async (e) => {
        e.preventDefault()
        btn.classList.remove('drop-target')
        const ids = selectedIds.size ? [...selectedIds] : [draggedBookmarkId].filter(Boolean)
        if (!ids.length) return
        await moveBookmarksToCollection(ids, btn.dataset.slug)
      })
    })
  }

  function setSidebarActive(filter, slug) {
    document.querySelectorAll('.nav-item').forEach((el) => {
      const match = el.dataset.filter === filter && (filter !== 'collection' || el.dataset.slug === slug)
      el.classList.toggle('active', match)
    })
    // Auto-expand parent when a child is selected
    if (filter === 'collection') {
      const btn = document.querySelector(`.nav-item[data-slug="${slug}"]`)
      const parentSlug = btn?.dataset.parent
      if (parentSlug) {
        const subNav = document.getElementById(`sub-${parentSlug}`)
        const parentBtn = document.querySelector(`.nav-item[data-slug="${parentSlug}"]`)
        if (subNav && !subNav.classList.contains('open')) {

          parentBtn?.classList.add('expanded')
          openParentSlugs.add(parentSlug)
        }

    }
  }

  function buildSubPanel(bookmarks) {
    const panel = document.getElementById('subPanel')
    if (currentFilter !== 'collection') { panel.classList.remove('visible'); return }

    const tagSet = new Set()
    bookmarks.forEach((b) => (b.tags||[]).forEach((t) => t && tagSet.add(t)))

    const tags = [...tagSet].sort()

      <button class="tag-chip${currentTag===''?' active':''}" data-tag="" onclick="selectTag(this,'')">All</button>
      ${tags.map((t) => `<button class="tag-chip${currentTag===t?' active':''}" data-tag="${esc(t)}" onclick="selectTag(this,'${esc(t)}')">${esc(t)}</button>`).join('')}

  async function runTranslate() {
    const input = document.getElementById('translateInput').value.trim()
    if (!input) {
      document.getElementById('translateInput').focus()
      setTranslateStatus('Add text', 'err')
      return
    }
    const btn = document.getElementById('translateRunBtn')
    btn.disabled = true
    btn.textContent = 'Translating...'
    setTranslateStatus('Asking owl-alpha...')
    try {
      const res = await apiFetch('/api/bookmarks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ translate: true, input }),
      })
      if (res.status === 401) { showAuth('Enter your dashboard password.'); return }
      const data = await safeJson(res)
      if (!res.ok) throw new Error(data.error || 'Translation failed')
      const t = data.translation || {}
      document.getElementById('translateEnglish').textContent = t.english || ''
      document.getElementById('translateThai').textContent = t.thai || ''
      const romanization = t.thai_romanization || ''
      document.getElementById('translateThaiRomanization').textContent = romanization
      document.getElementById('translateThaiRomanizationWrap')?.toggleAttribute('hidden', !romanization)
      document.getElementById('translateEnglishBox')?.classList.toggle('has-output', Boolean(t.english))
      document.getElementById('translateThaiBox')?.classList.toggle('has-output', Boolean(t.thai || romanization))
      document.getElementById('translateMeta').textContent = `Model: ${t.model_used || 'openrouter/owl-alpha'} · Source: ${t.source_language || 'unknown'}`
      setTranslateStatus('Done', 'ok')
    } catch (err) {
      setTranslateStatus(err.message || 'Translation failed', 'err')
    } finally {
      btn.disabled = false
      btn.textContent = 'Translate'
    }
  }

  async function copyTranslateOutput(kind) {
    const english = document.getElementById('translateEnglish')?.textContent || ''
    const thai = document.getElementById('translateThai')?.textContent || ''
    const value = kind === 'thai' ? thai : english
    if (!value) { setTranslateStatus('Nothing to copy', 'err'); return }
    try {
      await navigator.clipboard.writeText(value)
      setTranslateStatus('Copied', 'ok')
    } catch {
      setTranslateStatus('Could not copy', 'err')
    }
  }

  async function loadBookmarks({ background=false } = {}) {
    const params = new URLSearchParams()
    if (currentFilter === 'favorites') params.set('favorite','1')
    if (currentFilter === 'collection' && currentSlug) params.set('collection', currentSlug)
    const q = document.getElementById('searchInput').value.trim()
    if (q) params.set('q', q)

    const gridEl = document.getElementById('gridContainer')
    const listEl = document.getElementById('listContainer')
    if (!background) {
      if (currentView === 'grid') gridEl.innerHTML = '<div class="loading">Loading…</div>'
      else listEl.innerHTML = '<div class="loading">Loading…</div>'
      document.getElementById('emptyState').classList.remove('visible')
    }

    try {
      const res = await apiFetch(`/api/bookmarks?${params}`)
      if (res.status === 401) { showAuth('Enter your dashboard password.'); return }
      if (!res.ok) throw new Error('Could not load bookmarks')
      const data = await res.json()
      allBookmarks = data.bookmarks || []
      if (!params.toString()) writeCache(CACHE_KEYS.bookmarks, { bookmarks: allBookmarks })
      renderSubColGrid()
      buildSubPanel(allBookmarks)
      applyFilters()
      updateLastSynced()
    } catch (err) {
      if (!background) {
        showToast(err.message || 'Could not load bookmarks', 'err')
        showDataError(err.message || 'Could not load bookmarks', () => loadBookmarks())
      } else {
        setSyncStatus('Sync failed', 'warn')
      }
    }
  }

  function applyFilters() {
    // Trash is a self-managed view; don't let search/sort/view-toggle clobber it.
    if (currentFilter === 'trash') return
    const q = document.getElementById('searchInput').value.trim()
    if (currentFilter === 'ai') {
      document.getElementById('subColGrid').style.display = 'none'
      renderBookmarks(aiResults || [])
      return
    }
    if (currentFilter === 'recent') {
      document.getElementById('subColGrid').style.display = 'none'
      let recent = [...allBookmarks].sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
      if (q) recent = recent.filter((b) => bookmarkMatchesQuery(b, q))
      renderBookmarks(recent.slice(0, 10))
      return
    }
    if (currentFilter === 'all') document.getElementById('subColGrid').style.display = 'none'
    let items = getVisibleBookmarks()
    if (currentTag) items = items.filter((b) => (b.tags||[]).includes(currentTag))
    const sort = document.getElementById('sortSelect')?.value || 'manual'
    items = [...items].sort((a, b) => {
      if (sort === 'manual')     return (a.sort_order||0) - (b.sort_order||0)
      if (sort === 'date-asc')   return new Date(a.created_at) - new Date(b.created_at)
      if (sort === 'title-asc')  return (a.title||'').localeCompare(b.title||'')
      if (sort === 'title-desc') return (b.title||'').localeCompare(a.title||'')
      return new Date(b.created_at) - new Date(a.created_at)
    })
    renderBookmarks(items)
  }

  function getVisibleBookmarks() {
    const q = document.getElementById('searchInput').value.trim()
    let items = allBookmarks
    if (currentFilter === 'favorites') items = items.filter((b) => b.is_favorite)
    if (currentFilter === 'collection' && currentSlug) {
      if (currentSlug === '__inbox') items = items.filter((b) => !b.collection)
      else items = items.filter((b) => b.collection?.slug === currentSlug)
    }
    if (q) items = items.filter((b) => bookmarkMatchesQuery(b, q))
    return items
  }

  function bookmarkMatchesQuery(b, q) {
    const folder = b.collection ? `${b.collection.name} ${b.collection.slug}` : 'inbox unsorted'
    const text = [
      b.title, b.url, b.description, b.notes, domain(b.url), folder, ...(b.tags || []),
    ].join(' ').toLowerCase()
    // Match every word in the query (AND), so "facebook account" matches a bookmark
    // that contains both words even if they aren't adjacent.
    const terms = q.toLowerCase().split(/\s+/).filter(Boolean)
    return terms.every((t) => text.includes(t))
  }

  // Insert a just-created folder into local state immediately so it's usable everywhere
  // (sidebar + all folder dropdowns) without waiting on a reload — guards against
  // read-replica lag where the refetch hasn't caught up yet.
  function mergeOptimisticFolder(col) {
    if (!col || !col.id) return
    const c = { ...col, count: col.count || 0 }
    if (!flatCollections.some((x) => x.id === c.id)) flatCollections = [...flatCollections, c]
    if (c.parent_id) {
      const p = collections.find((x) => x.id === c.parent_id)
      if (p && !(p.children || []).some((x) => x.id === c.id)) p.children = [...(p.children || []), { ...c, children: [] }]
    } else if (!collections.some((x) => x.id === c.id)) {
      collections = [...collections, { ...c, children: [] }]
    }
    writeCache(CACHE_KEYS.collections, { collections, flat: flatCollections })
    renderSidebar()
    populateAddBarSelect()
    populateMoveSelect()
    refreshEditFolderSelect()
  }
